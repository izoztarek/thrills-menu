<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz - Official Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    margin: 0;
    background: #0d0d0d;
    color: #fff;
    overflow-x: hidden;
}

/* --- SECTION 1: HOME PAGE --- */
.home-screen {
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('bg.jpg');
    background-size: cover;
    background-position: center;
    padding: 40px 20px;
    display: block; /* الحالة الافتراضية */
}

.logo { text-align: center; margin-bottom: 40px; }
.logo img { width: 150px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }

.menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: auto;
}

@media(min-width: 768px) { .menu-grid { grid-template-columns: repeat(4, 1fr); } }

.menu-card {
    height: 250px;
    border-radius: 25px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
}

.menu-card img { width: 100%; height: 100%; object-fit: cover; }
.menu-card:hover { transform: scale(1.05); border-color: #c68a4a; }

/* --- SECTION 2: BUILDER (HIDDEN BY DEFAULT) --- */
.builder-screen {
    display: none; 
    position: fixed;
    inset: 0;
    z-index: 2000;
    background-size: cover;
    background-position: center;
    animation: fadeIn 0.5s ease;
}

.builder-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
    backdrop-filter: blur(15px);
    z-index: 1;
}

/* ICE CREAM PREVIEW */
.preview-container {
    position: relative;
    margin: 80px auto 0;
    width: 180px;
    height: 380px;
    z-index: 5;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.7));
}

.layer {
    position: absolute;
    width: 100%;
    left: 50%;
    transform: translateX(-50%);
    animation: popDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* تعديل مكان الحشو الداخلي ليكون فوق العود بالضبط */
.inner-filling {
    position: absolute;
    width: 130px;
    top: 60px; 
    left: 50%;
    transform: translateX(-50%);
    animation: popDown 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popDown {
    0% { transform: translateX(-50%) translateY(-20px) scale(0.8); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
}

/* GLASS OPTIONS PANEL */
.options-panel {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 35px;
    padding: 20px;
    z-index: 10;
}

.options-flex { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; }

.option-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }

.option-item img {
    width: 65px; height: 65px; object-fit: contain;
    background: rgba(255,255,255,0.05); border-radius: 18px;
    cursor: pointer; transition: 0.3s; border: 2px solid transparent;
}

.option-item img.active {
    transform: scale(1.15); border-color: #c68a4a;
    background: rgba(198, 138, 74, 0.2);
    box-shadow: 0 0 15px rgba(198, 138, 74, 0.5);
}

.label-text { font-size: 10px; text-transform: uppercase; opacity: 0; transition: 0.3s; }
.active + .label-text { opacity: 1; color: #c68a4a; }

/* NAV BUTTONS */
.btn-next {
    position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
    background: #c68a4a; color: #fff; border: none; padding: 16px 70px;
    border-radius: 40px; font-weight: 700; cursor: pointer; z-index: 10;
    box-shadow: 0 10px 20px rgba(198, 138, 74, 0.3);
}

.btn-back {
    position: absolute; top: 25px; left: 20px;
    background: rgba(255,255,255,0.1); padding: 10px 20px;
    border-radius: 30px; z-index: 10; cursor: pointer; font-size: 14px;
}

/* CHECKOUT SUMMARY */
#checkoutModal {
    display: none; position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
    justify-content: center; align-items: center;
}
.summary-box {
    background: rgba(255,255,255,0.05); padding: 40px; border-radius: 40px;
    text-align: center; border: 1px solid rgba(255,255,255,0.1); width: 85%; max-width: 400px;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="home-screen" id="homePage">
    <div class="logo"><img src="logo.png" alt="Thrillz"></div>
    <div class="menu-grid">
        <div class="menu-card" onclick="startBuilder()"><img src="iced-cover.jpg"></div>
        <div class="menu-card"><img src="frappe-cover.jpg"></div>
        <div class="menu-card"><img src="hot-cover.jpg"></div>
        <div class="menu-card"><img src="dessert-cover.jpg"></div>
        <div class="menu-card"><img src="bakery-cover.jpg"></div>
        <div class="menu-card"><img src="breakfast-cover.jpg"></div>
        <div class="menu-card"><img src="matcha-cover.jpg"></div>
        <div class="menu-card"><img src="smoothie-cover.jpg"></div>
    </div>
</div>

<div class="builder-screen" id="builderPage">
    <div class="btn-back" onclick="goBack()">← Back</div>
    
    <div style="position:absolute; top:35px; width:100%; text-align:center; z-index:10;">
        <div id="stepTitle" style="font-size:12px; letter-spacing:3px; font-weight:bold; color:#c68a4a;">SELECT BASE</div>
    </div>

    <div class="preview-container">
        <img id="baseLayer" class="layer">
        <img id="coatingLayer" class="layer">
        <img id="fillingLayer" class="inner-filling">
    </div>

    <div class="options-panel">
        <div class="options-flex" id="optionsGrid"></div>
    </div>

    <button class="btn-next" id="nextAction" onclick="nextStep()">NEXT STEP</button>
</div>

<div id="checkoutModal">
    <div class="summary-box">
        <h2 style="color:#c68a4a; margin-bottom: 20px;">Order Summary</h2>
        <div id="summaryContent" style="margin-bottom: 30px; line-height: 2;"></div>
        <button class="btn-next" style="position:static;" onclick="location.reload()">CONFIRM ORDER</button>
    </div>
</div>

<script>
// البيانات
const menuData = {
    1: { title: "SELECT BASE", bg: "images/bg/base-bg.jpg", items: [
        {name: "Vanilla", img: "images/base/vanilla.png"},
        {name: "Chocolate", img: "images/base/chocolate.png"},
        {name: "Strawberry", img: "images/base/strawberry.png"},
        {name: "Pistachio", img: "images/base/pistachio.png"}
    ]},
    2: { title: "CHOCOLATE TYPE", bg: "images/bg/type-bg.jpg", items: [
        {name: "Milk", img: "images/type/milk.jpg", id: "milk"},
        {name: "Dark", img: "images/type/dark.jpg", id: "dark"},
        {name: "White", img: "images/type/white.jpg", id: "white"}
    ]},
    4: { title: "ADD FILLING", bg: "images/bg/filling-bg.jpg", items: [
        {name: "Choco", img: "images/filling/chocolate.png"},
        {name: "Lotus", img: "images/filling/lotus.png"},
        {name: "Caramel", img: "images/filling/caramel.png"},
        {name: "Berry", img: "images/filling/berry.png"}
    ]}
};

let step = 1;
let selection = { base: "", type: "", typeName: "", coating: "", filling: "" };

function startBuilder() {
    document.getElementById('homePage').style.display = "none";
    document.getElementById('builderPage').style.display = "block";
    step = 1;
    render();
}

function goBack() {
    if(step === 1) {
        document.getElementById('homePage').style.display = "block";
        document.getElementById('builderPage').style.display = "none";
    } else {
        step--;
        render();
    }
}

function render() {
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = "";
    
    let current = menuData[step];

    // الخطوة 3 تعتمد على اختيار الخطوة 2
    if(step === 3) {
        current = {
            title: "SELECT COATING",
            bg: "images/bg/coating-bg.jpg",
            items: [
                {name: "Plain", img: `images/coating/${selection.type}_plain.png`},
                {name: "Pistachio", img: `images/coating/${selection.type}_pistachio.png`},
                {name: "Hazelnut", img: `images/coating/${selection.type}_hazelnut.png`}
            ]
        };
    }

    document.getElementById('stepTitle').innerText = current.title;
    document.getElementById('builderPage').style.backgroundImage = `url(${current.bg})`;
    document.getElementById('nextAction').innerText = (step === 4) ? "ADD TO CART 🛒" : "NEXT STEP";

    current.items.forEach(item => {
        const wrap = document.createElement('div');
        wrap.className = "option-item";
        
        const img = document.createElement('img');
        img.src = item.img;
        img.onclick = () => {
            document.querySelectorAll('.option-item img').forEach(i => i.classList.remove('active'));
            img.classList.add('active');
            
            if(step === 1) { baseLayer.src = item.img; selection.base = item.name; }
            if(step === 2) { selection.type = item.id; selection.typeName = item.name; }
            if(step === 3) { coatingLayer.src = item.img; selection.coating = item.name; }
            if(step === 4) { fillingLayer.src = item.img; selection.filling = item.name; }
        };

        const label = document.createElement('span');
        label.className = "label-text";
        label.innerText = item.name;

        wrap.appendChild(img);
        wrap.appendChild(label);
        grid.appendChild(wrap);
    });
}

function nextStep() {
    if(step === 1 && !selection.base) return alert("Please select a base!");
    if(step === 2 && !selection.type) return alert("Please select chocolate type!");
    if(step === 3 && !selection.coating) return alert("Please select coating!");

    if(step < 4) {
        step++;
        render();
    } else {
        document.getElementById('checkoutModal').style.display = "flex";
        document.getElementById('summaryContent').innerHTML = `
            <p><b>Base:</b> ${selection.base}</p>
            <p><b>Chocolate:</b> ${selection.typeName}</p>
            <p><b>Coating:</b> ${selection.coating}</p>
            <p><b>Filling:</b> ${selection.filling}</p>
        `;
    }
}
</script>

</body>
</html>
