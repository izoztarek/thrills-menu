<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<!-- Preload -->
<link rel="preload" as="image" href="images/bg/base-bg.jpg">
<link rel="preload" as="image" href="images/bg/type-bg.jpg">
<link rel="preload" as="image" href="images/bg/coating-bg.jpg">
<link rel="preload" as="image" href="images/bg/filling-bg.jpg">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    font-family:Arial;
}

/* MAIN */
.overlay{
    min-height:100vh;
    background:#000;
}

/* LOGO */
.logo{
    text-align:center;
    padding:20px;
}
.logo img{
    width:140px;
}

/* GRID */
.container{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card{
    height:220px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BUILDER */
.builder{
    display:none;
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:2000;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

/* TOP BAR */
.topBar{
    width:100%;
    display:flex;
    justify-content:flex-start;
    padding:20px;
}

.backBtn{
    background:white;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

/* ICECREAM */
.preview{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

.previewBox{
    position:relative;
    width:180px;
}

.layer{
    width:100%;
    position:absolute;
    left:0;
}

.innerLayer{
    position:absolute;
    width:140px;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
}

/* OPTIONS */
.options{
    width:100%;
    max-width:400px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
}

.options img{
    width:100%;
    max-width:90px;
    margin:auto;
    cursor:pointer;
}

/* BUTTON */
.nextBtn{
    margin-bottom:30px;
    background:#c68a4a;
    color:#fff;
    border:none;
    padding:14px 40px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

/* ACTIVE */
.active{
    transform:scale(1.1);
}

</style>
</head>

<body>

<div class="overlay">

<div class="logo">
<img src="logo.png">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openBuilder()">
<img src="iced-cover.jpg">
</div>

</div>
</div>

</div>

<!-- BUILDER -->
<div class="builder" id="builder">

<div class="topBar">
<div class="backBtn" onclick="goBack()">← Back</div>
</div>

<div class="preview">
<div class="previewBox">
<img id="base" class="layer">
<img id="coating" class="layer">
<img id="inner" class="innerLayer">
</div>
</div>

<!-- BASE -->
<div class="options" id="baseOptions">
<img src="images/base/vanilla.png" onclick="selectBase(this)">
<img src="images/base/chocolate.png" onclick="selectBase(this)">
<img src="images/base/strawberry.png" onclick="selectBase(this)">
<img src="images/base/pistachio.png" onclick="selectBase(this)">
<img src="images/base/hazelnut.png" onclick="selectBase(this)">
</div>

<!-- TYPE -->
<div class="options" id="typeOptions" style="display:none;">
<img src="images/type/milk.jpg" onclick="selectType(this,'milk')">
<img src="images/type/dark.jpg" onclick="selectType(this,'dark')">
<img src="images/type/white.jpg" onclick="selectType(this,'white')">
</div>

<!-- COATING -->
<div class="options" id="coatingOptions" style="display:none;"></div>

<!-- FILLING -->
<div class="options" id="fillingOptions" style="display:none;">
<img src="images/filling/chocolate.png" onclick="selectFilling(this)">
<img src="images/filling/lotus.png" onclick="selectFilling(this)">
<img src="images/filling/caramel.png" onclick="selectFilling(this)">
<img src="images/filling/berry.png" onclick="selectFilling(this)">
<img src="images/filling/pistachio.png" onclick="selectFilling(this)">
<img src="images/filling/milk.png" onclick="selectFilling(this)">
</div>

<button class="nextBtn" onclick="nextStep()">Next</button>

</div>

<script>

let step=1;
let selectedType="";

/* OPEN */
function openBuilder(){
builder.style.display="flex";
step=1;
updateStep();
}

/* BACK */
function goBack(){
if(step===1){
builder.style.display="none";
}else{
step--;
updateStep();
}
}

/* UPDATE */
function updateStep(){

baseOptions.style.display= step===1?"grid":"none";
typeOptions.style.display= step===2?"grid":"none";
coatingOptions.style.display= step===3?"grid":"none";
fillingOptions.style.display= step===4?"grid":"none";

builder.style.backgroundImage = [
"images/bg/base-bg.jpg",
"images/bg/type-bg.jpg",
"images/bg/coating-bg.jpg",
"images/bg/filling-bg.jpg"
][step-1];

}

/* NEXT */
function nextStep(){

if(step===1 && !base.src) return;
if(step===2 && !selectedType) return;
if(step===3 && !coating.src) return;

if(step===2){
coatingOptions.innerHTML=`
<img src="images/coating/${selectedType}_plain.png" onclick="selectCoating(this)">
<img src="images/coating/${selectedType}_pistachio.png" onclick="selectCoating(this)">
<img src="images/coating/${selectedType}_hazelnut.png" onclick="selectCoating(this)">
`;
}

if(step<4){
step++;
updateStep();
}

}

/* SELECT */
function selectBase(el){ base.src=el.src; setActive(el); }
function selectType(el,t){ selectedType=t; setActive(el); }
function selectCoating(el){ coating.src=el.src; setActive(el); }
function selectFilling(el){ inner.src=el.src; setActive(el); }

function setActive(el){
document.querySelectorAll(".options img").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

</script>

</body>
</html>
