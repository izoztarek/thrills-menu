<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kod El Fa7l</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* ===========================
   CSS VARIABLES & RESET
=========================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0805;
  --surface: #130f0a;
  --surface2: #1c1610;
  --surface3: #261e15;
  --accent: #d4952a;
  --accent2: #f0b84a;
  --accent3: #8b5e1a;
  --text: #f5ede0;
  --text2: #b8a48e;
  --text3: #7a6a57;
  --danger: #e05555;
  --radius: 18px;
  --radius-sm: 10px;
  --shadow: 0 8px 40px rgba(0,0,0,0.6);
  --glow: 0 0 30px rgba(212,149,42,0.25);
  --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===========================
   SCROLLBAR
=========================== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent3); border-radius: 4px; }

/* ===========================
   HERO / MAIN PAGE
=========================== */
#main-page {
  min-height: 100vh;
  padding: 0 0 60px;
}

.hero-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 32px;
  position: relative;
}

.logo-wrap {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--accent3);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
  box-shadow: var(--glow);
  overflow: hidden;
}

/* Logo image — place logo.png in same folder */
.logo-wrap img {
  width: 80px;
  height: 80px;
  object-fit: contain;
}

/* Fallback text logo */
.logo-text-fallback {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-weight: 900;
  color: var(--accent);
  text-align: center;
  line-height: 1.2;
  letter-spacing: 1px;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 7vw, 3.5rem);
  font-weight: 900;
  color: var(--text);
  text-align: center;
  line-height: 1.1;
}

.hero-title span {
  color: var(--accent);
  font-style: italic;
}

.hero-sub {
  margin-top: 8px;
  color: var(--text2);
  font-size: 0.9rem;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Decorative separator */
.sep {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 24px auto 0;
}

/* ===========================
   MENU GRID
=========================== */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  padding: 32px 16px 0;
  max-width: 1200px;
  margin: 0 auto;
}

@media (min-width: 600px) {
  .menu-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 32px 24px 0; }
}

@media (min-width: 900px) {
  .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 22px; }
}

/* ===========================
   MENU CARD
=========================== */
.menu-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 3/4;
  background: var(--surface2);
  transition: transform var(--transition), box-shadow var(--transition);
  border: 1px solid rgba(255,255,255,0.06);
}

.menu-card:hover,
.menu-card.in-view {
  transform: translateY(-6px) scale(1.02);
  box-shadow: var(--shadow), var(--glow);
}

.menu-card:active {
  transform: scale(0.97);
}

/* Card image */
.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease;
  loading: lazy;
}

.menu-card:hover .card-img {
  transform: scale(1.07);
}

/* Dark overlay */
.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(5,3,2,0.92) 0%,
    rgba(5,3,2,0.45) 40%,
    rgba(5,3,2,0.15) 100%
  );
}

/* Card content */
.card-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 14px 18px;
}

.card-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1rem, 3vw, 1.25rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 4px;
}

.card-tag {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
}

/* Custom badge */
.card-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: var(--accent);
  color: #0a0805;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 20px;
}

/* Card shimmer loading */
.card-shimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: shimmer 1.8s infinite;
  display: none;
}

.menu-card.loading .card-shimmer { display: block; }

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ===========================
   FULLSCREEN OVERLAY BASE
=========================== */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(5,3,2,0.97);
  backdrop-filter: blur(12px);
  display: none;
  flex-direction: column;
  overflow-y: auto;
  animation: fadeIn 0.3s ease;
}

.overlay.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Overlay header */
.overlay-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(5,3,2,0.95);
  backdrop-filter: blur(16px);
}

.overlay-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}

.btn-close {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: var(--surface2);
  color: var(--text2);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.btn-close:hover {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}

/* ===========================
   IMAGE VIEWER
=========================== */
#image-viewer {
  background: var(--bg);
}

.img-viewer-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
  padding: 0;
}

@media (min-width: 600px) {
  .img-viewer-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 900px) {
  .img-viewer-grid { grid-template-columns: repeat(3, 1fr); }
}

.viewer-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
  cursor: zoom-in;
}

.viewer-img:hover {
  transform: scale(1.02);
  z-index: 2;
  position: relative;
}

/* Lightbox */
#lightbox {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}

#lightbox.active { display: flex; }

#lightbox-img {
  max-width: 95vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: var(--radius-sm);
}

/* "Make Your Own" CTA section */
.make-own-section {
  padding: 48px 24px;
  text-align: center;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.make-own-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--text);
  margin-bottom: 12px;
}

.make-own-desc {
  color: var(--text2);
  font-size: 0.9rem;
  margin-bottom: 24px;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent);
  color: #0a0805;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
  padding: 14px 32px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(212,149,42,0.35);
}

.btn-primary:hover {
  background: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212,149,42,0.5);
}

.btn-primary:active { transform: translateY(0); }

/* ===========================
   BUILDER — SHARED
=========================== */
#builder-overlay {
  background: var(--bg);
}

/* Stepper */
.stepper {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 16px 20px 0;
  flex-wrap: wrap;
}

.step-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text3);
  padding: 6px 12px;
  border-radius: 50px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.25s;
  white-space: nowrap;
}

.step-pill.active {
  background: var(--accent);
  color: #0a0805;
  border-color: var(--accent);
  font-weight: 600;
}

.step-pill.done {
  background: var(--surface3);
  color: var(--accent);
  border-color: var(--accent3);
}

.step-num {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  flex-shrink: 0;
}

.step-pill.active .step-num { background: rgba(0,0,0,0.2); }
.step-pill.done .step-num { background: rgba(212,149,42,0.2); }

.step-connector {
  width: 20px;
  height: 1px;
  background: var(--surface3);
  flex-shrink: 0;
}

/* Builder body */
.builder-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 0 0 120px;
}

/* Preview area */
.preview-area {
  position: relative;
  width: 100%;
  max-width: 360px;
  margin: 24px auto 0;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.preview-bg-glow {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212,149,42,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.preview-plate {
  position: relative;
  width: 260px;
  height: 260px;
}

.preview-layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.preview-layer.hidden {
  opacity: 0;
  transform: scale(0.9);
  pointer-events: none;
}

/* Placeholder when no selection */
.preview-placeholder {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 2px dashed var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 0.8rem;
  text-align: center;
  transition: all 0.3s;
}

/* Step section */
.step-section {
  padding: 20px 16px 0;
  display: none;
}

.step-section.active { display: block; }

.step-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.step-hint {
  color: var(--text3);
  font-size: 0.78rem;
  margin-bottom: 16px;
}

/* Options grid */
.options-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

@media (min-width: 480px) {
  .options-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 700px) {
  .options-grid { grid-template-columns: repeat(4, 1fr); }
}

/* Option card */
.opt-card {
  position: relative;
  border-radius: var(--radius-sm);
  border: 1.5px solid rgba(255,255,255,0.07);
  background: var(--surface2);
  padding: 14px 10px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.22s;
  overflow: hidden;
  user-select: none;
}

.opt-card:hover {
  border-color: rgba(212,149,42,0.4);
  background: var(--surface3);
}

.opt-card.selected {
  border-color: var(--accent);
  background: var(--surface3);
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(212,149,42,0.3);
}

.opt-card.selected::after {
  content: '✓';
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 700;
}

.opt-icon {
  font-size: 1.8rem;
  margin-bottom: 6px;
  display: block;
  line-height: 1;
}

.opt-name {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}

.opt-price {
  font-size: 0.7rem;
  color: var(--accent);
  font-weight: 600;
  margin-top: 3px;
}

/* Multi-select hint */
.multi-hint {
  font-size: 0.72rem;
  color: var(--text3);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ===========================
   BOTTOM ACTION BAR
=========================== */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  padding: 16px 20px;
  background: linear-gradient(to top, rgba(5,3,2,1) 60%, rgba(5,3,2,0) 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.price-display {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
}

.price-display span {
  color: var(--accent);
}

.price-display small {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 400;
  color: var(--text3);
  letter-spacing: 0.5px;
}

.btn-next {
  background: var(--accent);
  color: #0a0805;
  border: none;
  border-radius: 50px;
  padding: 13px 28px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.22s;
  box-shadow: 0 4px 20px rgba(212,149,42,0.4);
  flex-shrink: 0;
}

.btn-next:hover:not(:disabled) {
  background: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212,149,42,0.55);
}

.btn-next:disabled {
  opacity: 0.35;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-back {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50px;
  padding: 13px 20px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.22s;
  flex-shrink: 0;
}

.btn-back:hover {
  background: var(--surface3);
  color: var(--text);
}

/* ===========================
   RESULT SCREEN
=========================== */
.result-screen {
  padding: 40px 24px 140px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  display: none;
}

.result-screen.active { display: flex; }

.result-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  animation: popIn 0.5s cubic-bezier(0.4,0,0.2,1);
}

@keyframes popIn {
  0% { transform: scale(0); }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.result-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.result-sub {
  color: var(--text2);
  font-size: 0.85rem;
  margin-bottom: 32px;
}

.result-card {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 400px;
  text-align: left;
  margin-bottom: 24px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.88rem;
}

.result-row:last-child { border-bottom: none; }

.result-row-label {
  color: var(--text2);
  font-weight: 400;
}

.result-row-value {
  color: var(--text);
  font-weight: 500;
  text-align: right;
  max-width: 55%;
}

.result-total {
  background: var(--surface2);
  border: 1px solid var(--accent3);
  border-radius: var(--radius);
  padding: 18px 24px;
  width: 100%;
  max-width: 400px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}

.result-total-label {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--text2);
}

.result-total-price {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--accent);
}

/* ===========================
   LIGHTBOX
=========================== */
#lightbox { cursor: zoom-out; }

#lightbox-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

/* ===========================
   TOAST NOTIFICATION
=========================== */
#toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface3);
  border: 1px solid var(--accent3);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 0.82rem;
  font-weight: 500;
  z-index: 300;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===========================
   SECTION LABEL BADGE
=========================== */
.section-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface3);
  border: 1px solid var(--accent3);
  color: var(--accent);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  margin-bottom: 10px;
}

/* ===========================
   MINI ICE CREAM FLAVORS
=========================== */
.flavor-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 20px 16px 120px;
}

@media (min-width: 500px) {
  .flavor-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 700px) {
  .flavor-grid { grid-template-columns: repeat(4, 1fr); }
}

.flavor-card {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  padding: 20px 12px 16px;
  text-align: center;
  transition: all 0.2s;
  cursor: default;
}

.flavor-card:hover {
  border-color: rgba(212,149,42,0.3);
  background: var(--surface3);
  transform: translateY(-3px);
}

.flavor-icon { font-size: 2.2rem; margin-bottom: 8px; display: block; }
.flavor-name { font-size: 0.82rem; font-weight: 500; color: var(--text); }
.flavor-price { font-size: 0.75rem; color: var(--accent); font-weight: 600; margin-top: 4px; }

/* ===========================
   MILKSHAKE — CATEGORY SELECT
=========================== */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.cat-card {

/* ===========================
   INTERSECTION OBSERVER (scroll scale)
=========================== */
function setupIntersectionObserver() {
  const cards = document.querySelectorAll('.menu-card');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('in-view');
      else e.target.classList.remove('in-view');
    });
  }, { threshold: 0.3 });
  cards.forEach(c => obs.observe(c));
}

/* ===========================
   CARD CLICK HANDLER
=========================== */
function handleCardClick(id) {
  const item = MENU.find(m => m.id === id);
  if (!item) return;

  if (item.action === 'builder') {
    openBuilder(item.builderType);
  } else if (item.action === 'mini') {
    openMiniViewer();
  } else if (item.action === 'viewer') {
    openViewer(item.name, item.images);
  } else if (item.action === 'viewer+builder') {
    openViewerWithBuilder(item);
  }
}

  currentStep = 0;

  if (type === 'icecream') {
    currentSteps = ICE_CREAM_STEPS;
    document.getElementById('builder-title').textContent = '🍦 Build Your Ice Cream';
  } else if (type === 'waffle') {
    currentSteps = WAFFLE_STEPS;
    document.getElementById('builder-title').textContent = '🧇 Build Your Waffle';
  } else if (type === 'milkshake') {
    currentSteps = buildMilkshakeSteps();
    document.getElementById('builder-title').textContent = '🥤 Build Your Milkshake';
  }

  renderBuilder();
  document.getElementById('builder-overlay').classList.add('active');
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('builder-bottom-bar').style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Auto-select fixed steps (waffle base)
  if (type === 'waffle') {
    const baseStep = currentSteps[0];
    if (baseStep.fixed) {
      selections['base'] = [baseStep.options[0].id];
      totalPrice += baseStep.options[0].price;
      updatePrice();
      goToStep(1);
      return;
    }
  }

  goToStep(0);
}

  // Returns base milkshake steps; dynamic flavors are filled in at runtime
  return [
    { ...MILKSHAKE_STEPS[0] },

      hint: 'Select your flavor(s)',

      isDynamic: true,

}

  selections = {};
  totalPrice = 0;
}

  const wrap = document.getElementById('stepper-wrap');

    const stepIdx = currentSteps.indexOf(step);

    return `
      ${i > 0 ? '<div class="step-connector"></div>' : ''}
      <div class="step-pill ${cls}">
        <div class="step-num">${stepIdx < currentStep ? '✓' : i+1}</div>
        ${step.label}
      </div>
    `;
  }).join('');
}

function getVisibleSteps() {
  // For milkshake Mix mode, add fruits step
  return currentSteps;
}

function renderStepSections() {
  const container = document.getElementById('steps-container');
  container.innerHTML = currentSteps.map((step, idx) => {
    const isActive = idx === currentStep;
    const isMulti = step.multi;
    return `
      <div class="step-section ${isActive ? 'active' : ''}" id="step-${idx}">
        <div class="section-badge">Step ${idx+1}</div>
        <div class="step-label">${step.label}</div>
        <div class="step-hint">${step.hint}</div>
        ${isMulti ? `<div class="multi-hint">☝️ Select up to ${step.maxSelect || 'multiple'}</div>` : ''}
        ${step.isCategoryStep ? renderCategoryStep(step) : renderOptionsGrid(step, idx)}
      </div>
    `;
  }).join('');
}

function renderCategoryStep(step) {
  return `
    <div class="cat-grid">
      ${step.options.map(opt => `
        <div class="cat-card" id="catcard-${opt.id}" onclick="selectCategory('${opt.id}')">
          <span class="cat-icon">${opt.icon}</span>
          <div class="cat-name">${opt.name}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderOptionsGrid(step, idx) {
  return `
    <div class="options-grid" id="opts-${idx}">
      ${step.options.map(opt => `
        <div class="opt-card" id="opt-${idx}-${opt.id}" onclick="selectOption(${idx},'${opt.id}',${step.multi || false})">
          <span class="opt-icon">${opt.icon}</span>
          <div class="opt-name">${opt.name}</div>
          ${opt.price > 0 ? `<div class="opt-price">+${opt.price} EGP</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

/* ===========================
   BUILDER — SELECTION LOGIC
=========================== */
function selectOption(stepIdx, optId, multi) {
  const step = currentSteps[stepIdx];
  if (!step) return;

  if (multi) {
    if (!selections[step.id]) selections[step.id] = [];
    const arr = selections[step.id];
    const pos = arr.indexOf(optId);
    if (pos > -1) {
      arr.splice(pos, 1);
    } else {
      if (step.maxSelect && arr.length >= step.maxSelect) {
        showToast(`Max ${step.maxSelect} selections`);
        return;
      }
      arr.push(optId);
    }
    // Update UI
    step.options.forEach(o => {
      const el = document.getElementById(`opt-${stepIdx}-${o.id}`);
      if (el) el.classList.toggle('selected', arr.includes(o.id));
    });
  } else {
    selections[step.id] = [optId];
    step.options.forEach(o => {
      const el = document.getElementById(`opt-${stepIdx}-${o.id}`);
      if (el) el.classList.toggle('selected', o.id === optId);
    });
  }

  recalcPrice();
  updateNextBtn();
  renderPreview();
}

function selectCategory(catId) {
  const stepIdx = currentSteps.findIndex(s => s.isCategoryStep);
  if (stepIdx < 0) return;
  const step = currentSteps[stepIdx];
  selections[step.id] = [catId];
  step.options.forEach(o => {
    const el = document.getElementById(`catcard-${o.id}`);
    if (el) el.classList.toggle('selected', o.id === catId);
  });

  // Rebuild dynamic flavor step
  rebuildMilkshakeFlavors(catId);
  updateNextBtn();
}

function rebuildMilkshakeFlavors(catId) {
  // Find and update the dynamic flavors step
  let flavorsStep = currentSteps.find(s => s.isDynamic);
  if (!flavorsStep) return;

  if (catId === 'chocolate_cat') {
    flavorsStep.hint = 'Pick your chocolate mix-in';
    flavorsStep.multi = false;
    flavorsStep.options = CHOCO_OPTIONS;
  } else if (catId === 'fruits_cat') {
    flavorsStep.hint = 'Pick your fruit mix-in';
    flavorsStep.multi = false;
    flavorsStep.options = FRUIT_OPTIONS;
  } else if (catId === 'mix_cat') {
    flavorsStep.hint = 'Choose your chocolates first';
    flavorsStep.multi = true;
    flavorsStep.maxSelect = 3;
    flavorsStep.options = CHOCO_OPTIONS;
    // Add fruits step if not present
    const hasExtra = currentSteps.find(s => s.isExtraStep);
    if (!hasExtra) {
      const fruitsStep = {
        id: 'fruits_mix',
        label: 'Choose Fruits',
        hint: 'Add fruits to your mix',
        multi: true,
        maxSelect: 3,
        isExtraStep: true,
        options: FRUIT_OPTIONS
      };
      currentSteps.push(fruitsStep);
    }
  }
  // Remove extra step if not mix
  if (catId !== 'mix_cat') {
    currentSteps = currentSteps.filter(s => !s.isExtraStep);
  }

  delete selections[flavorsStep.id];
  delete selections['fruits_mix'];
  renderBuilder();
}

/* ===========================
   PRICE CALCULATION
=========================== */
function recalcPrice() {
  let total = 0;
  currentSteps.forEach(step => {
    const sel = selections[step.id];
    if (!sel || sel.length === 0) return;
    sel.forEach(optId => {
      const opt = step.options.find(o => o.id === optId);
      if (opt) total += opt.price;
    });
  });
  totalPrice = total;
  updatePrice();
}

function updatePrice() {
  document.getElementById('live-price').textContent = totalPrice + ' EGP';
}

/* ===========================
   NAVIGATION
=========================== */
function updateNextBtn() {
  const btn = document.getElementById('btn-next');
  const step = currentSteps[currentStep];
  if (!step) return;
  const sel = selections[step.id];
  const hasSelection = sel && sel.length > 0;
  btn.disabled = !hasSelection;
  btn.textContent = currentStep === currentSteps.length - 1 ? 'Finish ✓' : 'Next →';
}

function goToStep(idx) {
  currentStep = idx;
  // Show correct step section
  document.querySelectorAll('.step-section').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  renderStepper();
  updateNextBtn();

  // Back button visibility
  document.getElementById('btn-back').style.display = idx === 0 ? 'none' : '';
  // Scroll to top of builder
  document.getElementById('builder-overlay').scrollTop = 0;
}

function builderNext() {
  const step = currentSteps[currentStep];
  const sel = selections[step.id];
  if (!sel || sel.length === 0) return;

  if (currentStep < currentSteps.length - 1) {
    goToStep(currentStep + 1);
  } else {
    showResult();
  }
}

function builderBack() {
  if (currentStep > 0) goToStep(currentStep - 1);
}

/* ===========================
   LIVE PREVIEW SYSTEM
   NOTE: Replace emoji-based preview with actual layered images if available.
   To use real images: create images for each selection state and set their src here.
=========================== */
function renderPreview() {
  const plate = document.getElementById('preview-plate');
  const placeholder = document.getElementById('preview-placeholder');

  const baseStep = currentSteps[0];
  const baseSel = selections[baseStep?.id];

  if (!baseSel || baseSel.length === 0) {
    plate.innerHTML = `<div class="preview-placeholder"><span>Choose options<br>to preview</span></div>`;
    return;
  }

  // Build visual preview using emoji layers stacked
  // Replace this with actual <img> layers when you have preview images
  const layers = [];

  if (currentBuilder === 'icecream') {
    const base = currentSteps[0].options.find(o => o.id === (baseSel[0]));
    const choco = selections['chocolate_type'] ? currentSteps[1].options.find(o => o.id === selections['chocolate_type'][0]) : null;
    const coating = selections['coating'] ? currentSteps[2].options.find(o => o.id === selections['coating'][0]) : null;
    const filling = selections['filling'] ? currentSteps[3].options.find(o => o.id === selections['filling'][0]) : null;

    plate.innerHTML = `
      <div style="width:260px;height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
        <div style="font-size:5rem;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.5));animation:popIn 0.4s ease;">${base?.icon || '🍦'}</div>
        ${choco ? `<div style="font-size:1rem;color:var(--accent2);font-weight:600;">${choco.icon} ${choco.name}</div>` : ''}
        ${coating && coating.id !== 'none' ? `<div style="font-size:0.85rem;color:var(--text2);">${coating.icon} ${coating.name}</div>` : ''}
        ${filling && filling.id !== 'none' ? `<div style="font-size:0.8rem;color:var(--text3);">${filling.icon} inside</div>` : ''}
      </div>
    `;
  } else if (currentBuilder === 'waffle') {
    const sauce = selections['sauce'] ? currentSteps[1].options.find(o => o.id === selections['sauce'][0]) : null;
    const toppings = selections['toppings'] || [];
    const toppingOpts = currentSteps[2].options.filter(o => toppings.includes(o.id));

    plate.innerHTML = `
      <div style="width:260px;height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
        <div style="font-size:5rem;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.5));animation:popIn 0.4s ease;">🧇</div>
        ${sauce ? `<div style="font-size:1rem;color:var(--accent2);font-weight:600;">${sauce.icon} ${sauce.name} sauce</div>` : ''}
        ${toppingOpts.length > 0 ? `<div style="font-size:0.85rem;color:var(--text2);">${toppingOpts.map(t=>t.icon).join(' ')}</div>` : ''}
      </div>
    `;
  } else if (currentBuilder === 'milkshake') {
    const base = currentSteps[0].options.find(o => o.id === baseSel[0]);
    const cat = selections['category'] ? currentSteps[1].options.find(o => o.id === selections['category'][0]) : null;
    const flavors = selections['flavors'] || [];
    const flavorOpts = (currentSteps.find(s => s.isDynamic)?.options || []).filter(o => flavors.includes(o.id));

    plate.innerHTML = `
      <div style="width:260px;height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
        <div style="font-size:5rem;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.5));animation:popIn 0.4s ease;">${base?.icon || '🥤'}</div>
        ${cat ? `<div style="font-size:0.9rem;color:var(--accent2);font-weight:600;">${cat.icon} ${cat.name}</div>` : ''}
        ${flavorOpts.length > 0 ? `<div style="font-size:0.85rem;color:var(--text2);">${flavorOpts.map(f=>f.icon).join(' ')}</div>` : ''}
      </div>
    `;
  }
}

/* ===========================
   RESULT SCREEN
=========================== */
function showResult() {
  document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
  document.getElementById('builder-bottom-bar').style.display = 'none';
  document.getElementById('stepper-wrap').innerHTML = '';

  const rows = [];
  currentSteps.forEach(step => {
    const sel = selections[step.id];
    if (!sel || sel.length === 0) return;
    const names = sel.map(id => step.options.find(o => o.id === id)?.name || id).join(', ');
    rows.push({ label: step.label, value: names });
  });

  document.getElementById('result-rows').innerHTML = rows.map(r => `
    <div class="result-row">
      <span class="result-row-label">${r.label}</span>
      <span class="result-row-value">${r.value}</span>
    </div>
  `).join('');

  recalcPrice();
  document.getElementById('result-price').textContent = totalPrice + ' EGP';
  document.getElementById('result-screen').classList.add('active');
  document.getElementById('builder-overlay').scrollTop = 0;
}

/* ===========================
   TOAST
=========================== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ===========================
   INIT
=========================== */
renderMenu();
</script>
