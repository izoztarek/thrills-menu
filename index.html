<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz - Premium Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    margin: 0;
    background: #1a1a1a;
    color: #fff;
    overflow: hidden;
}

/* BUILDER MAIN */
.builder {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: background-image 0.6s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.builder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
    backdrop-filter: blur(10px);
    z-index: 1;
}

/* PREVIEW & ANIMATION */
.preview {
    position: relative;
    margin-top: 100px;
    width: 200px;
    height: 400px;
    z-index: 5;
    filter: drop-shadow(0 25px 40px rgba(0,0,0,0.6));
}

.layer {
    position: absolute;
    width: 100%;
    left: 50%;
    transform: translateX(-50%);
    animation: dropEffect 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* تعديل مكان الحشو الداخلي ليكون فوق العود */
.innerLayer {
    position: absolute;
    width: 140px;
    top: 50px; /* تم تعديله ليكون في منتصف الآيس كريم فوق العود */
    left: 50%;
    transform: translateX(-50%);
    animation: dropEffect 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes dropEffect {
    0% { transform: translateX(-50%) translateY(-30px) scale(0.9); opacity: 0; }
    100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
}

/* OPTIONS UI */
.options-wrapper {
    position: absolute;
    bottom: 120px;
    width: 90%;
    max-width: 500px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 35px;
    padding: 20px;
    z-index: 10;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.options {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
}

.item-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.options img {
    width: 70px;
    height: 70px;
    object-fit: contain;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    border: 2px solid transparent;
}

.options img.active {
    transform: scale(1.1) translateY(-5px);
    border-color: #c68a4a;
    background: rgba(198, 138, 74, 0.2);
    box-shadow: 0 10px 20px rgba(198, 138, 74, 0.3);
}

.label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0;
    transition: 0.3s;
}

.active + .label { opacity: 1; color: #c68a4a; }

/* STEPPER */
.stepper-container {
    position: absolute;
    top: 30px;
    z-index: 10;
    text-align: center;
}

.dots { display: flex; gap: 8px; justify-content: center; margin-top: 5px; }
.dot { width: 8px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: 0.4s; }
.dot.active { background: #c68a4a; width: 25px; border-radius: 10px; }

/* SUMMARY PANEL (MODAL) */
#summaryPanel {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 3000;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
}

.summary-card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 40px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    width: 85%;
    max-width: 400px;
}

.summary-card h2 { color: #c68a4a; margin-bottom: 20px; }
.summary-item { margin: 10px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

/* BUTTONS */
.nextBtn {
    position: absolute;
    bottom: 30px;
    background: #c68a4a;
    color: #fff;
    border: none;
    padding: 16px 70px;
    border-radius: 40px;
    font-weight: 700;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 10px 30px rgba(198, 138, 74, 0.4);
}

.backBtn {
    position: absolute;
    top: 25px;
    left: 20px;
    background: rgba(255,255,255,0.1);
    padding: 10px 20px;
    border-radius: 30px;
    z-index: 10;
    cursor: pointer;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="builder" id="mainBuilder">
    <div class="backBtn" onclick="window.history.back()">← Back</div>

    <div class="stepper-container">
        <div id="stepTitle" style="font-weight:600; font-size:14px; letter-spacing:2px;">SELECT BASE</div>
        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="preview">
        <img id="baseImg" class="layer">
        <img id="coatingImg" class="layer">
        <img id="innerImg" class="innerLayer">
    </div>

    <div class="options-wrapper">
        <div class="options" id="optionsGrid"></div>
    </div>

    <button class="nextBtn" onclick="handleNext()" id="actionBtn">NEXT</button>
</div>

<div id="summaryPanel">
    <div class="summary-card">
        <h2>Your Creation!</h2>
        <div id="summaryList"></div>
        <button class="nextBtn" style="position:static; margin-top:20px;" onclick="location.reload()">CONFIRM ORDER</button>
    </div>
</div>

<script>
// المكونات والبيانات
const data = {
    step1: { title: "SELECT BASE", bg: "images/bg/base-bg.jpg", items: [
        {name: "Vanilla", src: "images/base/vanilla.png"},
        {name: "Chocolate", src: "images/base/chocolate.png"},
        {name: "Strawberry", src: "images/base/strawberry.png"},
        {name: "Pistachio", src: "images/base/pistachio.png"}
    ]},
    step2: { title: "CHOCOLATE TYPE", bg: "images/bg/type-bg.jpg", items: [
        {name: "Milk", src: "images/type/milk.jpg", id: "milk"},
        {name: "Dark", src: "images/type/dark.jpg", id: "dark"},
        {name: "White", src: "images/type/white.jpg", id: "white"}
    ]},
    step4: { title: "ADD FILLING", bg: "images/bg/filling-bg.jpg", items: [
        {name: "Choco", src: "images/filling/chocolate.png"},
        {name: "Lotus", src: "images/filling/lotus.png"},
        {name: "Caramel", src: "images/filling/caramel.png"},
        {name: "Berry", src: "images/filling/berry.png"}
    ]}
};

let currentStep = 1;
let selections = { base: "", type: "", coating: "", filling: "" };

// تشغيل أول خطوة عند التحميل
renderOptions();

function renderOptions() {
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = "";
    
    let currentData = data[`step${currentStep}`];

    // حالة خاصة للخطوة 3 (Coating) المعتمدة على الخطوة 2
    if(currentStep === 3) {
        currentData = {
            title: "SELECT COATING",
            bg: "images/bg/coating-bg.jpg",
            items: [
                {name: "Plain", src: `images/coating/${selections.type}_plain.png`},
                {name: "Pistachio", src: `images/coating/${selections.type}_pistachio.png`},
                {name: "Hazelnut", src: `images/coating/${selections.type}_hazelnut.png`}
            ]
        };
    }

    document.getElementById('stepTitle').innerText = currentData.title;
    document.getElementById('mainBuilder').style.backgroundImage = `url(${currentData.bg})`;

    currentData.items.forEach(item => {
        const box = document.createElement('div');
        box.className = "item-box";
        
        const img = document.createElement('img');
        img.src = item.src;
        img.onclick = () => selectItem(img, item);
        
        const label = document.createElement('span');
        label.className = "label";
        label.innerText = item.name;

        box.appendChild(img);
        box.appendChild(label);
        grid.appendChild(box);
    });

    updateDots();
}

function selectItem(el, item) {
    // مسح الـ active
    el.parentElement.parentElement.querySelectorAll('img').forEach(i => i.classList.remove('active'));
    el.classList.add('active');

    if(currentStep === 1) { baseImg.src = item.src; selections.base = item.name; }
    if(currentStep === 2) { selections.type = item.id; selections.typeName = item.name; }
    if(currentStep === 3) { coatingImg.src = item.src; selections.coating = item.name; }
    if(currentStep === 4) { innerImg.src = item.src; selections.filling = item.name; }
}

function handleNext() {
    if(currentStep === 1 && !selections.base) return;
    if(currentStep === 2 && !selections.type) return;
    if(currentStep === 3 && !selections.coating) return;

    if(currentStep < 4) {
        currentStep++;
        renderOptions();
        if(currentStep === 4) document.getElementById('actionBtn').innerText = "ADD TO CART 🛒";
    } else {
        showSummary();
    }
}

function updateDots() {
    const dots = document.querySelectorAll('.dot');
    dots.forEach((d, i) => d.classList.toggle('active', i === currentStep - 1));
}

function showSummary() {
    document.getElementById('summaryPanel').style.display = "flex";
    document.getElementById('summaryList').innerHTML = `
        <div class="summary-item"><b>Base:</b> ${selections.base}</div>
        <div class="summary-item"><b>Chocolate:</b> ${selections.typeName}</div>
        <div class="summary-item"><b>Coating:</b> ${selections.coating}</div>
        <div class="summary-item"><b>Filling:</b> ${selections.filling}</div>
    `;
}
</script>

</body>
</html>
