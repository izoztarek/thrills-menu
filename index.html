<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

/* ===== خلفية ===== */
body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.45);
    min-height: 100vh;
}

/* ===== اللوجو ===== */
.logo {
    text-align: center;
    padding: 30px;
}

.logo img {
    width: 150px;
}

/* ===== الجريد ===== */
.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.card {
    height: 330px;
    border-radius: 25px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s ease;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

.card:hover,
.card.active {
    transform: scale(1.05);
    box-shadow: 0 15px 30px rgba(255,255,255,0.2);
}

/* ===== BUILDER ===== */
.builder {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    text-align: center;
    padding: 20px;
}

/* عنوان */
.header {
    margin-top: 30px;
    font-size: 24px;
    color: white;
    font-family: 'Trebuchet MS', cursive;
}

/* اسم الفليفر */
.flavorName {
    margin-top: 10px;
    color: white;
    font-size: 18px;
}

/* Preview */
.preview {
    position: relative;
    width: 200px;
    height: 400px;
    margin: 30px auto;
}

.layer {
    position: absolute;
    width: 100%;
}

/* Options */
.options {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

/* شكل العود */
.options img {
    width: 60px;
    height: 120px;
    object-fit: contain;
    cursor: pointer;
}

.active {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px white);
}

/* Buttons */
.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border-radius: 25px;
    border: none;
    background: #c68a4a;
    color: white;
    cursor: pointer;
}

.backBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    color: black;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="overlay">

<div class="logo">
<img src="logo.png">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openIce()"><img src="iced-cover.jpg"></div>

<div class="card"><img src="frappe-cover.jpg"></div>
<div class="card"><img src="hot-cover.jpg"></div>

</div>
</div>

</div>

<!-- BUILDER -->
<div class="builder" id="builder">

<div class="backBtn" onclick="goBack()">← Back</div>

<div class="header" id="title">Choose Your Base Flavor</div>
<div class="flavorName" id="flavorText"></div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
</div>

<!-- STEP 1 BASE -->
<div class="options" id="baseOptions">
<img src="images/base/vanilla.png" onclick="selectBase(this,'Vanilla','images/base/vanilla.png')">
<img src="images/base/chocolate.png" onclick="selectBase(this,'Chocolate','images/base/chocolate.png')">
<img src="images/base/strawberry.png" onclick="selectBase(this,'Strawberry','images/base/strawberry.png')">
<img src="images/base/pistachio.png" onclick="selectBase(this,'Pistachio','images/base/pistachio.png')">
<img src="images/base/hazelnut.png" onclick="selectBase(this,'Hazelnut','images/base/hazelnut.png')">
</div>

<!-- STEP 2 TYPE -->
<div class="options" id="typeOptions" style="display:none;">
<button class="btn" onclick="chooseType('Milk')">Milk</button>
<button class="btn" onclick="chooseType('Dark')">Dark</button>
<button class="btn" onclick="chooseType('White')">White</button>
</div>

<!-- STEP 3 FLAVOR -->
<div class="options" id="coatingOptions" style="display:none;">
<img src="images/coating/milk_plain.png" onclick="selectCoating(this,'Plain')">
<img src="images/coating/milk_pistachio.png" onclick="selectCoating(this,'Pistachio')">
<img src="images/coating/milk_hazelnut.png" onclick="selectCoating(this,'Hazelnut')">
</div>

<button class="btn" onclick="nextStep()">Next</button>

</div>

<script>

let step = 1;
let selectedType = "";

/* فتح */
function openIce(){
document.getElementById("builder").style.display="block";
}

/* رجوع */
function goBack(){
if(step==2){
step=1;
document.getElementById("typeOptions").style.display="none";
document.getElementById("baseOptions").style.display="flex";
document.getElementById("title").innerText="Choose Your Base Flavor";
}
else if(step==3){
step=2;
document.getElementById("coatingOptions").style.display="none";
document.getElementById("typeOptions").style.display="flex";
document.getElementById("title").innerText="Choose Your Coating";
}
}

/* اختيار البيز */
function selectBase(el,name,src){
document.getElementById("base").src=src;
document.getElementById("flavorText").innerText=name;

setActive(el);
}

/* Next */
function nextStep(){
if(step==1){
step=2;
document.getElementById("baseOptions").style.display="none";
document.getElementById("typeOptions").style.display="flex";
document.getElementById("title").innerText="Choose Your Coating Flavor";
}
else if(step==2){
step=3;
document.getElementById("typeOptions").style.display="none";
document.getElementById("coatingOptions").style.display="flex";
}
}

/* نوع الصوص */
function chooseType(type){
selectedType = type;
}

/* اختيار الصوص */
function selectCoating(el,name){
document.getElementById("flavorText").innerText = selectedType + " " + name;
setActive(el);
}

/* Active */
function setActive(el){
document.querySelectorAll(".options img").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

</script>

</body>
</html>
