<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu - Dynamic Builder</title>

<!-- PRELOAD BACKGROUNDS -->
<link rel="preload" as="image" href="images/bg/base-bg.jpg">
<link rel="preload" as="image" href="images/bg/type-bg.jpg">
<link rel="preload" as="image" href="images/bg/coating-bg.jpg">
<link rel="preload" as="image" href="images/bg/filling-bg.jpg">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
    overflow-x: hidden;
}

/* MAIN OVERLAY */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
}

/* LOGO */
.logo {
    text-align: center;
    padding: 25px;
}
.logo img {
    width: 150px;
}

/* GRID SYSTEM */
.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

@media(min-width: 768px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
}
@media(min-width: 1100px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
}

/* CARDS */
.card {
    height: 300px;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* AUTO FOCUS EFFECT */
.card.active {
    transform: scale(1.04);
    box-shadow: 0 20px 50px rgba(255,255,255,0.1);
}

/* DYNAMIC BUILDER OVERLAY */
.builder {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 2000;
    overflow-y: auto; /* يضمن إمكانية التمرير لو الشاشة صغيرة جداً */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* BLUR BACKGROUND EFFECT FOR BETTER UI */
.builder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    z-index: 1;
}

/* ICECREAM PREVIEW CONTAINER */
.preview {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 320px;
    z-index: 5;
}

.layer {
    position: absolute;
    width: 100%;
    left: 50%;
    transform: translateX(-50%);
    transition: all 0.3s ease-in-out;
}

.innerLayer {
    position: absolute;
    width: 120px;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    transition: all 0.3s ease-in-out;
}

/* OPTIONS GRID - RESPONSIVE FLEX */
.options {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 95%;
    max-width: 500px; /* تقليص العرض ليجبر العناصر على الالتفاف بشكل متناسق */
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    z-index: 5;
    max-height: 180px;
}

/* IMAGE OPTIONS COMMON STYLES */
.options img {
    width: 75px;
    height: 75px;
    object-fit: contain;
    background: rgba(255, 255, 255, 0.15);
    padding: 8px;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s, border 0.3s, box-shadow 0.3s;
    border: 2px solid transparent;
}

/* TYPE GRID ADJUSTMENT */
.typeGrid img {
    width: 100px;
    height: 100px;
    object-fit: cover;
}

/* ACTION ACTIVE STATES */
.options img.active {
    transform: scale(1.1);
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
    background: rgba(255, 255, 255, 0.25);
}

/* STEPPER INDICATOR */
.stepper {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
    background: rgba(0,0,0,0.5);
    padding: 8px 20px;
    border-radius: 20px;
}

/* BOTTOM NAVIGATION CONTROL BUTTONS */
.nextBtn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #c68a4a;
    color: #fff;
    border: none;
    padding: 14px 50px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.nextBtn:hover {
    background: #e09f5b;
    box-shadow: 0 8px 20px rgba(198, 138, 74, 0.4);
}

.backBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    color: #333;
    padding: 10px 20px;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.2s;
}

.backBtn:hover {
    background: #f0f0f0;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="logo">
        <img src="logo.png" alt="Thrillz Logo">
    </div>

    <div class="container">
        <div class="grid">
            <div class="card" onclick="openBuilder()"><img src="iced-cover.jpg"></div>
            <div class="card"><img src="frappe-cover.jpg"></div>
            <div class="card"><img src="hot-cover.jpg"></div>
            <div class="card"><img src="dessert-cover.jpg"></div>
            <div class="card"><img src="bakery-cover.jpg"></div>
            <div class="card"><img src="breakfast-cover.jpg"></div>
            <div class="card"><img src="matcha-cover.jpg"></div>
            <div class="card"><img src="smoothie-cover.jpg"></div>
        </div>
    </div>
</div>

<!-- BUILDER SYSTEM -->
<div class="builder" id="builder">
    <div class="backBtn" onclick="goBack()">← Back</div>
    <div class="stepper" id="stepper">Step 1 / 4</div>

    <div class="preview">
        <img id="base" class="layer">
        <img id="coating" class="layer">
        <img id="inner" class="innerLayer">
    </div>

    <!-- STEP 1: BASE -->
    <div class="options" id="baseOptions">
        <img src="images/base/vanilla.png" onclick="selectBase(this)">
        <img src="images/base/chocolate.png" onclick="selectBase(this)">
        <img src="images/base/strawberry.png" onclick="selectBase(this)">
        <img src="images/base/pistachio.png" onclick="selectBase(this)">
        <img src="images/base/hazelnut.png" onclick="selectBase(this)">
    </div>

    <!-- STEP 2: CHOCOLATE TYPE -->
    <div class="options typeGrid" id="typeOptions" style="display:none;">
        <img src="images/type/milk.jpg" onclick="selectType(this,'milk')">
        <img src="images/type/dark.jpg" onclick="selectType(this,'dark')">
        <img src="images/type/white.jpg" onclick="selectType(this,'white')">
    </div>

    <!-- STEP 3: COATING (DYNAMICALLY POPULATED) -->
    <div class="options" id="coatingOptions" style="display:none;"></div>

    <!-- STEP 4: FILLING -->
    <div class="options" id="fillingOptions" style="display:none;">
        <img src="images/filling/chocolate.png" onclick="selectFilling(this)">
        <img src="images/filling/lotus.png" onclick="selectFilling(this)">
        <img src="images/filling/caramel.png" onclick="selectFilling(this)">
        <img src="images/filling/berry.png" onclick="selectFilling(this)">
        <img src="images/filling/pistachio.png" onclick="selectFilling(this)">
        <img src="images/filling/milk.png" onclick="selectFilling(this)">
    </div>

    <button class="nextBtn" id="nextBtn" onclick="nextStep()">Next</button>
</div>

<script>
/* BG LIST */
const bgList = [
    "images/bg/base-bg.jpg",
    "images/bg/type-bg.jpg",
    "images/bg/coating-bg.jpg",
    "images/bg/filling-bg.jpg"
];

/* FAST PRELOAD BACKGROUNDS */
bgList.forEach(src => {
    let img = new Image();
    img.src = src;
});

/* AUTO FOCUS SCROLL OBSERVER */
const cards = document.querySelectorAll(".card");
const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
        e.target.classList.toggle("active", e.isIntersecting);
    });
}, { threshold: 0.6 });
cards.forEach(c => observer.observe(c));

/* BUILDER ENGINE */
let step = 1, selectedType = "";

function openBuilder() {
    // Reset inputs on fresh open
    base.removeAttribute('src');
    coating.removeAttribute('src');
    inner.removeAttribute('src');
    document.querySelectorAll(".options img").forEach(i => i.classList.remove("active"));
    selectedType = "";

    builder.style.display = "block";
    step = 1;
    updateStep();
}

function goBack() {
    if (step === 1) {
        builder.style.display = "none";
    } else {
        step--;
        updateStep();
    }
}

function updateStep() {
    // Show/Hide step options Panels
    baseOptions.style.display    = step === 1 ? "flex" : "none";
    typeOptions.style.display    = step === 2 ? "flex" : "none";
    coatingOptions.style.display = step === 3 ? "flex" : "none";
    fillingOptions.style.display = step === 4 ? "flex" : "none";

    // Set Dynamic Background & Stepper Progress Title
    builder.style.backgroundImage = `url(${bgList[step - 1]})`;
    stepper.textContent = `Step ${step} / 4`;

    // Change Next button text on the last step
    if (step === 4) {
        nextBtn.textContent = "Add to Cart 🛒";
    } else {
        nextBtn.textContent = "Next";
    }
}

function nextStep() {
    // Validation: Prevent skipped steps
    if (step === 1 && !base.getAttribute('src')) return alert("Please select a base flavor!");
    if (step === 2 && !selectedType) return alert("Please select a chocolate type!");
    if (step === 3 && !coating.getAttribute('src')) return alert("Please select a coating topping!");

    // تفعيل الخطوة الثالثة وحقن الصور بناءً على النوع الصافي المختار
    if (step === 2) {
        coatingOptions.innerHTML = `
            <img src="images/coating/${selectedType}_plain.png" onclick="selectCoating(this)">
            <img src="images/coating/${selectedType}_pistachio.png" onclick="selectCoating(this)">
            <img src="images/coating/${selectedType}_hazelnut.png" onclick="selectCoating(this)">
        `;
    }

    if (step < 4) {
        step++;
        updateStep();
    } else {
        // Step 4 Complete: Trigger Order logic
        alert("Delicious! Item successfully built and added to your cart 🎉");
        builder.style.display = "none";
    }
}

/* SELECTION TRIGGERS */
function selectBase(el) { base.src = el.src; setActive(el); }
function selectType(el, t) { selectedType = t; setActive(el); } // هنا نقرأ الكلمة الصافية مباشرة
function selectCoating(el) { coating.src = el.src; setActive(el); }
function selectFilling(el) { inner.src = el.src; setActive(el); }

/* FIX: SCOPED ACTIVE STATE SWITCHER */
function setActive(el) {
    // Clears active state inside current container only
    el.parentElement.querySelectorAll("img").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
}
</script>

</body>
</html>
