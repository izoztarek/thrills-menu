<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

/* ===== خلفية ===== */
body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.45);
    min-height: 100vh;
}

/* ===== اللوجو ===== */
.logo {
    text-align: center;
    padding: 30px;
}

.logo img {
    width: 150px;
}

/* ===== الجريد ===== */
.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

@media(min-width: 768px){
    .grid { grid-template-columns: repeat(3, 1fr); }
}

@media(min-width: 1100px){
    .grid { grid-template-columns: repeat(4, 1fr); }
}

/* ===== الكروت ===== */
.card {
    height: 330px;
    border-radius: 25px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s ease;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card:hover,
.card.active {
    transform: scale(1.07);
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
}

/* ===== Viewer ===== */
.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}

.viewer-card {
    width: 85%;
    max-width: 380px;
    border-radius: 20px;
    overflow: hidden;
}

.viewer-card img {
    width: 100%;
}

.nav {
    position: absolute;
    top: 50%;
    font-size: 30px;
    color: white;
    cursor: pointer;
}

.left { left: 20px; }
.right { right: 20px; }

.back {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
}

.dots {
    margin-top: 15px;
    display: flex;
    gap: 8px;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
}

.dot.active {
    background: #c68a4a;
}

/* ===== ICE CUSTOMIZER ===== */
.ice-box {
    position: relative;
    width: 200px;
    height: 300px;
}

.ice-box img {
    position: absolute;
    width: 100%;
}

/* ===== SCRATCH ===== */
.scratch-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,#2b1d14,#5c3b2e);
    z-index: 99999;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.scratch-box {
    position: relative;
    width: 280px;
    height: 180px;
    border-radius: 20px;
    overflow: hidden;
}

.scratch-text {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-weight: bold;
}

canvas {
    position: absolute;
    inset: 0;
    touch-action: none;
}

.close-x {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- ===== SCRATCH ===== -->
<div class="scratch-screen" id="scratchScreen">
<div class="close-x" onclick="closeScratch()">✕</div>
<h2 style="color:white;">جاهز لحاجة حلوة؟ 😏</h2>

<div class="scratch-box">
<div class="scratch-text">🔥 خصم 10% النهارده</div>
<canvas id="scratchCanvas"></canvas>
</div>
</div>

<div class="overlay">

<div class="logo">
<img src="logo.png">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openIce()"><img src="iced-cover.jpg"></div>
<div class="card" onclick="openSection('frappe')"><img src="frappe-cover.jpg"></div>
<div class="card" onclick="openSection('hot')"><img src="hot-cover.jpg"></div>
<div class="card" onclick="openSection('dessert')"><img src="dessert-cover.jpg"></div>
<div class="card" onclick="openSection('bakery')"><img src="bakery-cover.jpg"></div>
<div class="card" onclick="openSection('breakfast')"><img src="breakfast-cover.jpg"></div>
<div class="card" onclick="openSection('matcha')"><img src="matcha-cover.jpg"></div>
<div class="card" onclick="openSection('smoothie')"><img src="smoothie-cover.jpg"></div>

</div>
</div>

</div>

<!-- ===== VIEWER ===== -->
<div class="viewer" id="viewer">
<div class="back" onclick="closeViewer()">← Back</div>
<span class="nav left" onclick="prev()">❮</span>

<div class="viewer-card">
<img id="viewerImg">
</div>

<span class="nav right" onclick="next()">❯</span>
<div class="dots" id="dots"></div>
</div>

<!-- ===== ICE VIEWER ===== -->
<div class="viewer" id="iceViewer">

<div class="back" onclick="closeIce()">← Back</div>

<h3 style="color:white;">Create Your Ice Cream 🍦</h3>

<div class="ice-box">
<img src="base.png">
<img id="topping">
<img id="filling">
</div>

<div style="margin-top:20px">

<h4 style="color:white">Topping</h4>
<button onclick="setTopping('chocolate.png')">Chocolate</button>
<button onclick="setTopping('caramel.png')">Caramel</button>

<h4 style="color:white">Filling</h4>
<button onclick="setFilling('strawberry.png')">Strawberry</button>
<button onclick="setFilling('nutella.png')">Nutella</button>

</div>

</div>

<script>

/* ===== SCRATCH ===== */
document.body.style.overflow="hidden";

let canvas=document.getElementById("scratchCanvas");
let ctx=canvas.getContext("2d");

canvas.width=280;
canvas.height=180;

ctx.fillStyle="#c68a4a";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation="destination-out";

canvas.addEventListener("touchmove",(e)=>{
e.preventDefault();
let rect=canvas.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;
ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.fill();
});

function closeScratch(){
document.getElementById("scratchScreen").style.display="none";
document.body.style.overflow="auto";
}

/* ===== ICE ===== */
function openIce(){
document.getElementById("iceViewer").style.display="flex";
}
function closeIce(){
document.getElementById("iceViewer").style.display="none";
}
function setTopping(img){
document.getElementById("topping").src=img;
}
function setFilling(img){
document.getElementById("filling").src=img;
}

/* ===== MENU ===== */
let sections={
frappe:["frappe1.jpg"],
hot:["hot1.jpg"],
dessert:["dessert1.jpg"],
bakery:["bakery1.jpg"],
breakfast:["breakfast1.jpg"],
matcha:["matcha1.jpg"],
smoothie:["smoothie1.jpg"]
};

let currentImages=[];
let currentIndex=0;

function openSection(section){
currentImages=sections[section];
currentIndex=0;
document.getElementById("viewer").style.display="flex";
updateViewer();
}

function updateViewer(){
document.getElementById("viewerImg").src=currentImages[currentIndex];
let dots=document.getElementById("dots");
dots.innerHTML="";
currentImages.forEach((_,i)=>{
let d=document.createElement("div");
d.classList.add("dot");
if(i===currentIndex)d.classList.add("active");
dots.appendChild(d);
});
}

function next(){if(currentIndex<currentImages.length-1){currentIndex++;updateViewer();}}
function prev(){if(currentIndex>0){currentIndex--;updateViewer();}}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

/* auto focus */
const cards=document.querySelectorAll(".card");
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
entry.target.classList.toggle("active",entry.isIntersecting);
});
},{threshold:0.6});

cards.forEach(card=>observer.observe(card));

</script>

</body>
</html>
