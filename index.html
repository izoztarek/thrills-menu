<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:url('bg.jpg') no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    background:rgba(0,0,0,0.5);
    min-height:100vh;
}

/* Logo */
.logo{
    text-align:center;
    padding:25px;
}
.logo img{
    width:150px;
}

/* Grid */
.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

@media(min-width:768px){
    .grid{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:1100px){
    .grid{grid-template-columns:repeat(4,1fr);}
}

/* Cards */
.card{
    height:300px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ⭐ Hover + Auto Focus */
.card:hover,
.card.active{
    transform:scale(1.07);
    box-shadow:0 25px 60px rgba(255,255,255,0.3);
}

/* ===== BUILDER ===== */
.builder{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    z-index:2000;
    text-align:center;
    overflow-y:auto;
    padding:20px;
}

.header{
    margin-top:40px;
    color:#fff;
    font-size:26px;
}

.flavorName{
    color:#fff;
    margin-top:10px;
}

/* Preview */
.preview{
    position:relative;
    width:200px;
    height:400px;
    margin:20px auto;
}

.layer{
    position:absolute;
    width:100%;
    left:50%;
    transform:translateX(-50%);
}

.innerLayer{
    position:absolute;
    width:115px;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
}

/* Options */
.options{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    justify-items:center;
    padding-bottom:120px;
}

.options img{
    width:90px;
    height:90px;
    object-fit:contain;
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:15px;
    cursor:pointer;
}

/* Active */
.active{
    transform:scale(1.2);
    filter:drop-shadow(0 0 10px #fff);
}

/* Next */
.nextBtn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#c68a4a;
    color:#fff;
    border:none;
    padding:12px 30px;
    border-radius:25px;
    cursor:pointer;
}

/* Back */
.backBtn{
    position:absolute;
    top:20px;
    left:20px;
    background:#fff;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay">

<div class="logo">
<img src="logo.png">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openBuilder()"><img src="iced-cover.jpg"></div>
<div class="card"><img src="frappe-cover.jpg"></div>
<div class="card"><img src="hot-cover.jpg"></div>
<div class="card"><img src="dessert-cover.jpg"></div>
<div class="card"><img src="bakery-cover.jpg"></div>
<div class="card"><img src="breakfast-cover.jpg"></div>
<div class="card"><img src="matcha-cover.jpg"></div>
<div class="card"><img src="smoothie-cover.jpg"></div>

</div>
</div>

</div>

<!-- BUILDER -->
<div class="builder" id="builder">

<div class="backBtn" onclick="goBack()">← Back</div>

<div class="header">Choose Your Base</div>
<div class="flavorName" id="flavorText"></div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
<img id="inner" class="innerLayer">
</div>

<div class="options" id="baseOptions">
<img src="images/base/vanilla.png" onclick="selectBase(this,'Vanilla')">
<img src="images/base/chocolate.png" onclick="selectBase(this,'Chocolate')">
<img src="images/base/strawberry.png" onclick="selectBase(this,'Strawberry')">
<img src="images/base/pistachio.png" onclick="selectBase(this,'Pistachio')">
<img src="images/base/hazelnut.png" onclick="selectBase(this,'Hazelnut')">
</div>

<button class="nextBtn" onclick="nextStep()">Next</button>

</div>

<script>

/* ===== AUTO FOCUS ===== */
const cards = document.querySelectorAll(".card");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("active");
        } else {
            entry.target.classList.remove("active");
        }
    });
},{
    threshold:0.6
});

cards.forEach(card => observer.observe(card));

/* ===== BUILDER ===== */
function openBuilder(){
    builder.style.display="block";
}

function goBack(){
    builder.style.display="none";
}

function selectBase(el,name){
    base.src=el.src;
    flavorText.innerText=name;
}

</script>

</body>
</html>
