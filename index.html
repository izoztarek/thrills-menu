<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

/* ===== Background ===== */
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* ===== MENU ===== */
.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 15px;
}

.card {
    height: 150px;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== BUILDER ===== */
.builder {
    position: fixed;
    inset: 0;
    background: #0f0f0f;
    z-index: 2000;
    display: none;
    padding: 20px;
    text-align: center;
}

.header {
    font-size: 20px;
    margin-top: 20px;
}

.stepBox {
    position: absolute;
    right: 20px;
    top: 20px;
    background: #222;
    padding: 8px 15px;
    border-radius: 20px;
}

/* Preview */
.preview {
    position: relative;
    width: 200px;
    height: 400px;
    margin: 30px auto;
}

.layer {
    position: absolute;
    width: 100%;
}

/* Steps */
.step {
    display: none;
}

.activeStep {
    display: block;
}

/* Options */
.options {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.options img {
    width: 60px;
    height: 120px;
    object-fit: contain;
    cursor: pointer;
}

.active {
    transform: scale(1.15);
    filter: drop-shadow(0 0 10px #c68a4a);
}

/* Buttons */
.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    background: #c68a4a;
    color: white;
    cursor: pointer;
}

.back {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    color: black;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- ===== MENU ===== -->
<div class="container">
    <div class="grid">
        <div class="card" onclick="openIce()">
            <img src="iced-cover.jpg">
        </div>

        <div class="card"><img src="frappe-cover.jpg"></div>
        <div class="card"><img src="hot-cover.jpg"></div>
        <div class="card"><img src="dessert-cover.jpg"></div>
    </div>
</div>

<!-- ===== BUILDER ===== -->
<div class="builder" id="builder">

<div class="back" onclick="closeIce()">← Back</div>

<div class="stepBox" id="stepText">1 / 3</div>

<div class="header" id="title">Choose Your Base</div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
<img id="inner" class="layer">
</div>

<!-- STEP 1 -->
<div class="step activeStep" id="step1">
<div class="options">
<img src="images/base/vanilla.png" onclick="selectBase(this,'images/base/vanilla.png')">
<img src="images/base/chocolate.png" onclick="selectBase(this,'images/base/chocolate.png')">
<img src="images/base/strawberry.png" onclick="selectBase(this,'images/base/strawberry.png')">
<img src="images/base/pistachio.png" onclick="selectBase(this,'images/base/pistachio.png')">
<img src="images/base/hazelnut.png" onclick="selectBase(this,'images/base/hazelnut.png')">
</div>
<button class="btn" onclick="nextStep()">Next</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<div class="options">
<img src="images/coating/milk_plain.png" onclick="selectCoating(this,'images/coating/milk_plain.png')">
<img src="images/coating/dark_plain.png" onclick="selectCoating(this,'images/coating/dark_plain.png')">
<img src="images/coating/white_plain.png" onclick="selectCoating(this,'images/coating/white_plain.png')">
</div>
<button class="btn" onclick="nextStep()">Next</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<div class="options">
<img src="images/inner/chocolate.png" onclick="selectInner(this,'images/inner/chocolate.png')">
<img src="images/inner/lotus.png" onclick="selectInner(this,'images/inner/lotus.png')">
<img src="images/inner/caramel.png" onclick="selectInner(this,'images/inner/caramel.png')">
</div>
<button class="btn" onclick="closeIce()">Done</button>
</div>

</div>

<script>

let currentStep = 1;

function openIce(){
    document.getElementById("builder").style.display = "block";
}

function closeIce(){
    document.getElementById("builder").style.display = "none";
}

/* اختيار */
function selectBase(el,src){
    document.getElementById("base").src = src;
    setActive(el);
}

function selectCoating(el,src){
    document.getElementById("coating").src = src;
    setActive(el);
}

function selectInner(el,src){
    document.getElementById("inner").src = src;
    setActive(el);
}

/* Next */
function nextStep(){

    if(currentStep == 1){
        if(!document.getElementById("base").src){
            alert("Choose base first");
            return;
        }
        document.getElementById("title").innerText = "Choose Coating";
    }

    if(currentStep == 2){
        document.getElementById("title").innerText = "Choose Filling";
    }

    document.getElementById("step"+currentStep).classList.remove("activeStep");

    currentStep++;
    document.getElementById("stepText").innerText = currentStep + " / 3";

    document.getElementById("step"+currentStep).classList.add("activeStep");
}

/* Active */
function setActive(el){
    let imgs = document.querySelectorAll(".options img");
    imgs.forEach(i => i.classList.remove("active"));
    el.classList.add("active");
}

</script>

</body>
</html>
