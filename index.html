<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

/* ===== خلفية ===== */
body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.45);
    min-height: 100vh;
}

/* ===== اللوجو ===== */
.logo {
    text-align: center;
    padding: 30px;
}

.logo img {
    width: 150px;
}

/* ===== الجريد ===== */
.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

@media(min-width: 768px){
    .grid { grid-template-columns: repeat(3, 1fr); }
}

@media(min-width: 1100px){
    .grid { grid-template-columns: repeat(4, 1fr); }
}

/* ===== الكروت ===== */
.card {
    height: 330px;
    border-radius: 25px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s ease;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card:hover,
.card.active {
    transform: scale(1.07);
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
}

/* ===== Viewer ===== */
.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}

.viewer-card {
    width: 85%;
    max-width: 380px;
    border-radius: 20px;
    overflow: hidden;
}

.viewer-card img {
    width: 100%;
}

.nav {
    position: absolute;
    top: 50%;
    font-size: 30px;
    color: white;
    cursor: pointer;
}

.left { left: 20px; }
.right { right: 20px; }

.back {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
}

/* dots */
.dots {
    margin-top: 15px;
    display: flex;
    gap: 8px;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
}

.dot.active {
    background: #c68a4a;
}

/* ===== ICE BUILDER ===== */
.builder {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    text-align: center;
    padding: 20px;
}

.header {
    margin-top: 40px;
    font-size: 22px;
}

/* Preview */
.preview {
    position: relative;
    width: 200px;
    height: 400px;
    margin: 40px auto;
}

.layer {
    position: absolute;
    width: 100%;
}

/* Options */
.options {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

/* شكل العود */
.options img {
    width: 60px;
    height: 120px;
    object-fit: contain;
    cursor: pointer;
}

.active {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px #c68a4a);
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border-radius: 25px;
    border: none;
    background: #c68a4a;
    color: white;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="overlay">

    <div class="logo">
        <img src="logo.png">
    </div>

    <div class="container">
        <div class="grid">

            <!-- هنا غيرنا بس الفنكشن -->
            <div class="card" onclick="openIce()"><img src="iced-cover.jpg"></div>

            <div class="card" onclick="openSection('frappe')"><img src="frappe-cover.jpg"></div>
            <div class="card" onclick="openSection('hot')"><img src="hot-cover.jpg"></div>
            <div class="card" onclick="openSection('dessert')"><img src="dessert-cover.jpg"></div>
            <div class="card" onclick="openSection('bakery')"><img src="bakery-cover.jpg"></div>
            <div class="card" onclick="openSection('breakfast')"><img src="breakfast-cover.jpg"></div>
            <div class="card" onclick="openSection('matcha')"><img src="matcha-cover.jpg"></div>
            <div class="card" onclick="openSection('smoothie')"><img src="smoothie-cover.jpg"></div>

        </div>
    </div>

</div>

<!-- Viewer -->
<div class="viewer" id="viewer">

    <div class="back" onclick="closeViewer()">← Back</div>

    <span class="nav left" onclick="prev()">❮</span>

    <div class="viewer-card">
        <img id="viewerImg">
    </div>

    <span class="nav right" onclick="next()">❯</span>

    <div class="dots" id="dots"></div>

</div>

<!-- ===== ICE BUILDER ===== -->
<div class="builder" id="builder">

<div class="back" onclick="closeIce()">← Back</div>

<div class="header">Choose Your Base</div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
<img id="inner" class="layer">
</div>

<!-- BASE -->
<div class="options">
<img src="images/base/vanilla.png" onclick="selectBase(this,'images/base/vanilla.png')">
<img src="images/base/chocolate.png" onclick="selectBase(this,'images/base/chocolate.png')">
<img src="images/base/strawberry.png" onclick="selectBase(this,'images/base/strawberry.png')">
<img src="images/base/pistachio.png" onclick="selectBase(this,'images/base/pistachio.png')">
<img src="images/base/hazelnut.png" onclick="selectBase(this,'images/base/hazelnut.png')">
</div>

<button class="btn" onclick="nextStep()">Next</button>

</div>

<script>

/* ===== MENU ===== */
let sections = {
    frappe: ["frappe1.jpg"],
    hot: ["hot1.jpg","hot2.jpg"],
    dessert: ["dessert1.jpg"],
    bakery: ["bakery1.jpg"],
    breakfast: ["breakfast1.jpg"],
    matcha: ["matcha1.jpg"],
    smoothie: ["smoothie1.jpg"]
};

let currentImages = [];
let currentIndex = 0;

function openSection(section) {
    currentImages = sections[section];
    currentIndex = 0;
    document.getElementById("viewer").style.display = "flex";
    updateViewer();
}

function updateViewer() {
    document.getElementById("viewerImg").src = currentImages[currentIndex];
}

function next(){ if(currentIndex < currentImages.length-1){ currentIndex++; updateViewer(); } }
function prev(){ if(currentIndex > 0){ currentIndex--; updateViewer(); } }

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}

/* ===== ICE ===== */
function openIce(){
    document.getElementById("builder").style.display="block";
}
function closeIce(){
    document.getElementById("builder").style.display="none";
}

function selectBase(el,src){
    document.getElementById("base").src = src;
    document.querySelectorAll(".options img").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
}

function nextStep(){
    alert("هنكمل الخطوة الجاية بعد ما نخلص UI 👑");
}

/* auto focus */
const cards = document.querySelectorAll(".card");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        entry.target.classList.toggle("active", entry.isIntersecting);
    });
}, { threshold: 0.6 });

cards.forEach(card => observer.observe(card));

</script>

</body>
</html>
