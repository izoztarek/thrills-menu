<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

/* ===== خلفية ===== */
body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.45);
    min-height: 100vh;
}

/* ===== اللوجو ===== */
.logo {
    text-align: center;
    padding: 30px;
}

.logo img {
    width: 150px;
}

/* ===== الجريد ===== */
.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

@media(min-width: 768px){
    .grid { grid-template-columns: repeat(3, 1fr); }
}

@media(min-width: 1100px){
    .grid { grid-template-columns: repeat(4, 1fr); }
}

/* ===== الكروت ===== */
.card {
    height: 330px;
    border-radius: 25px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s ease;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card:hover,
.card.active {
    transform: scale(1.07);
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
}

/* ===== Viewer ===== */
.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
}

/* الكارت في النص */
.viewer-card {
    width: 85%;
    max-width: 380px;
    border-radius: 20px;
    overflow: hidden;
}

.viewer-card img {
    width: 100%;
    border-radius: 20px;
}

/* الأسهم */
.nav {
    position: absolute;
    top: 50%;
    font-size: 30px;
    color: white;
    cursor: pointer;
}

.left { left: 20px; }
.right { right: 20px; }

/* زر الرجوع */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #c68a4a;
    color: white;
    padding: 10px 18px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* ===== Dots ===== */
.dots {
    margin-top: 15px;
    display: flex;
    gap: 8px;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
}

.dot.active {
    background: #c68a4a;
}

</style>
</head>

<body>

<div class="overlay">

    <!-- اللوجو -->
    <div class="logo">
        <img src="logo.png">
    </div>

    <!-- الأقسام -->
    <div class="container">
        <div class="grid">

            <div class="card" onclick="openSection('iced')"><img src="iced-cover.jpg"></div>
            <div class="card" onclick="openSection('frappe')"><img src="frappe-cover.jpg"></div>
            <div class="card" onclick="openSection('hot')"><img src="hot-cover.jpg"></div>
            <div class="card" onclick="openSection('dessert')"><img src="dessert-cover.jpg"></div>
            <div class="card" onclick="openSection('bakery')"><img src="bakery-cover.jpg"></div>
            <div class="card" onclick="openSection('breakfast')"><img src="breakfast-cover.jpg"></div>
            <div class="card" onclick="openSection('matcha')"><img src="matcha-cover.jpg"></div>
            <div class="card" onclick="openSection('smoothie')"><img src="smoothie-cover.jpg"></div>

        </div>
    </div>

</div>

<!-- ===== Viewer ===== -->
<div class="viewer" id="viewer">

    <div class="back" onclick="closeViewer()">← Back</div>

    <span class="nav left" onclick="prev()">❮</span>

    <div class="viewer-card">
        <img id="viewerImg">
    </div>

    <span class="nav right" onclick="next()">❯</span>

    <!-- dots -->
    <div class="dots" id="dots"></div>

</div>

<script>

/* صور كل قسم */
let sections = {
    iced: ["iced1.jpg","iced2.jpg"],
    frappe: ["frappe1.jpg"],
    hot: ["hot1.jpg","hot2.jpg"],
    dessert: ["dessert1.jpg"],
    bakery: ["bakery1.jpg"],
    breakfast: ["breakfast1.jpg"],
    matcha: ["matcha1.jpg"],
    smoothie: ["smoothie1.jpg"]
};

let currentImages = [];
let currentIndex = 0;

/* فتح القسم */
function openSection(section) {
    currentImages = sections[section];
    currentIndex = 0;

    document.getElementById("viewer").style.display = "flex";
    updateViewer();
}

/* تحديث الصورة + dots */
function updateViewer() {
    document.getElementById("viewerImg").src = currentImages[currentIndex];

    let dotsContainer = document.getElementById("dots");
    dotsContainer.innerHTML = "";

    currentImages.forEach((_, i) => {
        let dot = document.createElement("div");
        dot.classList.add("dot");
        if(i === currentIndex) dot.classList.add("active");
        dotsContainer.appendChild(dot);
    });
}

/* التالي */
function next() {
    if (currentIndex < currentImages.length - 1) {
        currentIndex++;
        updateViewer();
    }
}

/* السابق */
function prev() {
    if (currentIndex > 0) {
        currentIndex--;
        updateViewer();
    }
}

/* رجوع */
function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

</script>

</body>
</html>
