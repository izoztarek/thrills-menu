<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(3px);
    min-height: 100vh;
}

/* logo */
.logo {
    text-align: center;
    padding: 30px;
}

.logo img {
    width: 150px;
}

/* grid */
.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
}

@media(min-width:768px){
.grid{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:1100px){
.grid{grid-template-columns:repeat(4,1fr);}
}

/* cards */
.card {
    height: 330px;
    border-radius: 25px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card:hover,
.card.active {
    transform: scale(1.07);
    box-shadow: 0 30px 70px rgba(0,0,0,0.6);
}

/* viewer */
.viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* back button FIXED */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #c68a4a;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    z-index: 9999;
    font-weight: bold;
}

/* viewer card */
.viewer-card {
    width: 85%;
    max-width: 380px;
    border-radius: 20px;
    overflow: hidden;
}

.viewer-card img {
    width: 100%;
}

/* arrows */
.nav {
    position: absolute;
    top: 50%;
    font-size: 30px;
    color: white;
    cursor: pointer;
}

.left{left:20px;}
.right{right:20px;}

/* dots */
.dots {
    margin-top: 15px;
    display: flex;
    gap: 8px;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
}

.dot.active {
    background: #c68a4a;
}

/* ===== COMMENT BOX ===== */
.comment-box {
    margin-top: 15px;
    width: 85%;
    max-width: 380px;
    background: white;
    border-radius: 15px;
    padding: 10px;
}

.comment-box textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
}

.stars {
    display: flex;
    gap: 5px;
    margin-bottom: 5px;
}

.star {
    cursor: pointer;
    font-size: 18px;
    color: #ccc;
}

.star.active {
    color: gold;
}

.submit-btn {
    margin-top: 5px;
    background: #c68a4a;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="overlay">

<div class="logo">
<img src="logo.png">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openSection('iced')"><img src="iced-cover.jpg"></div>
<div class="card" onclick="openSection('frappe')"><img src="frappe-cover.jpg"></div>
<div class="card" onclick="openSection('hot')"><img src="hot-cover.jpg"></div>
<div class="card" onclick="openSection('dessert')"><img src="dessert-cover.jpg"></div>

</div>
</div>

</div>

<!-- viewer -->
<div class="viewer" id="viewer">

<div class="back" onclick="closeViewer()">Back</div>

<span class="nav left" onclick="prev()">❮</span>

<div class="viewer-card" id="swipeArea">
<img id="viewerImg">
</div>

<span class="nav right" onclick="next()">❯</span>

<div class="dots" id="dots"></div>

<!-- comment -->
<div class="comment-box">
<div class="stars" id="stars"></div>
<textarea placeholder="Write your opinion..."></textarea>
<button class="submit-btn">Submit</button>
</div>

</div>

<script>

/* data */
let sections={
iced:["iced1.jpg","iced2.jpg"],
frappe:["frappe1.jpg"],
hot:["hot1.jpg"],
dessert:["dessert1.jpg"]
};

let currentImages=[];
let currentIndex=0;

function openSection(section){
currentImages=sections[section];
currentIndex=0;
document.getElementById("viewer").style.display="flex";
updateViewer();
}

function updateViewer(){
document.getElementById("viewerImg").src=currentImages[currentIndex];

let dots=document.getElementById("dots");
dots.innerHTML="";
currentImages.forEach((_,i)=>{
let d=document.createElement("div");
d.classList.add("dot");
if(i===currentIndex)d.classList.add("active");
dots.appendChild(d);
});
}

function next(){
if(currentIndex<currentImages.length-1){
currentIndex++;
updateViewer();
}
}

function prev(){
if(currentIndex>0){
currentIndex--;
updateViewer();
}
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}

/* swipe FIX */
let startX=0;
const swipeArea=document.getElementById("swipeArea");

swipeArea.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

swipeArea.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50) next();
if(endX-startX>50) prev();
});

/* stars */
let starsContainer=document.getElementById("stars");

for(let i=1;i<=5;i++){
let star=document.createElement("span");
star.innerHTML="★";
star.classList.add("star");

star.onclick=()=>{
document.querySelectorAll(".star").forEach(s=>s.classList.remove("active"));
for(let j=0;j<i;j++){
starsContainer.children[j].classList.add("active");
}
};

starsContainer.appendChild(star);
}

/* auto focus scroll */
const cards=document.querySelectorAll(".card");

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("active");
}else{
entry.target.classList.remove("active");
}
});
},{threshold:0.6});

cards.forEach(card=>observer.observe(card));

</script>

</body>
</html>
