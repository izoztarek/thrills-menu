<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<!-- Preload -->
<link rel="preload" as="image" href="images/bg/base-bg.jpg">
<link rel="preload" as="image" href="images/bg/type-bg.jpg">
<link rel="preload" as="image" href="images/bg/coating-bg.jpg">
<link rel="preload" as="image" href="images/bg/filling-bg.jpg">

<style>

body{
    margin:0;
    font-family:Arial;
    background:url('bg.jpg') no-repeat center center fixed;
    background-size:cover;
}

/* MAIN */
.overlay{
    background:rgba(0,0,0,0.5);
    min-height:100vh;
}

/* LOGO */
.logo{
    text-align:center;
    padding:25px;
}
.logo img{
    width:150px;
}

/* GRID */
.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

/* CARDS */
.card{
    height:300px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BUILDER FIXED */
.builder{
    display:none;
    position:fixed;
    inset:0;
    z-index:2000;

    overflow:hidden;

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* ICECREAM CENTER */
.preview{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:200px;
    height:400px;
    z-index:5;
}

.layer{
    position:absolute;
    width:100%;
    left:50%;
    transform:translateX(-50%);
}

.innerLayer{
    position:absolute;
    width:150px;
    top:-25px;
    left:50%;
    transform:translateX(-50%);
}

/* OPTIONS FIXED */
.options{
    position:fixed;
    bottom:110px;
    left:0;
    width:100%;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    justify-items:center;
}

/* TYPE */
.typeGrid img{
    width:90%;
    height:110px;
    object-fit:cover;
    border-radius:15px;
}

/* NORMAL */
.options img{
    width:90px;
    height:90px;
    object-fit:contain;
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:15px;
    cursor:pointer;
}

/* FILLING BIGGER */
#fillingOptions img{
    width:110px;
    height:110px;
}

/* ACTIVE */
.active{
    transform:scale(1.2);
    filter:drop-shadow(0 0 10px white);
}

/* BUTTONS */
.nextBtn{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#c68a4a;
    color:#fff;
    border:none;
    padding:14px 40px;
    border-radius:30px;
    font-size:18px;
    z-index:9999;
}

.backBtn{
    position:fixed;
    top:70px;
    left:20px;
    background:white;
    padding:8px 15px;
    border-radius:20px;
    z-index:10;
}

</style>
</head>

<body>

<div class="overlay">

<div class="logo">
<img src="logo.png" loading="lazy">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openBuilder()"><img src="iced-cover.jpg" loading="lazy"></div>

</div>
</div>

</div>

<!-- BUILDER -->
<div class="builder" id="builder">

<div class="backBtn" onclick="goBack()">← Back</div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
<img id="inner" class="innerLayer">
</div>

<!-- BASE -->
<div class="options" id="baseOptions">
<img src="images/base/vanilla.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/chocolate.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/strawberry.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/pistachio.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/hazelnut.png" loading="lazy" onclick="selectBase(this)">
</div>

<!-- TYPE -->
<div class="options typeGrid" id="typeOptions" style="display:none;">
<img src="images/type/milk.jpg" loading="lazy" onclick="selectType(this,'milk')">
<img src="images/type/dark.jpg" loading="lazy" onclick="selectType(this,'dark')">
<img src="images/type/white.jpg" loading="lazy" onclick="selectType(this,'white')">
</div>

<!-- COATING -->
<div class="options" id="coatingOptions" style="display:none;"></div>

<!-- FILLING -->
<div class="options" id="fillingOptions" style="display:none;">
<img src="images/filling/chocolate.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/lotus.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/caramel.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/berry.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/pistachio.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/milk.png" loading="lazy" onclick="selectFilling(this)">
</div>

<button class="nextBtn" onclick="nextStep()">Next</button>

</div>

<script>

/* PRELOAD */
[
"images/bg/base-bg.jpg",
"images/bg/type-bg.jpg",
"images/bg/coating-bg.jpg",
"images/bg/filling-bg.jpg"
].forEach(src=>{
    let img=new Image();
    img.src=src;
});

let step=1, selectedType="";

function openBuilder(){
builder.style.display="block";
step=1;
updateStep();
}

function goBack(){
if(step===1){
builder.style.display="none";
}else{
step--;
updateStep();
}
}

function updateStep(){

baseOptions.style.display= step===1?"grid":"none";
typeOptions.style.display= step===2?"grid":"none";
coatingOptions.style.display= step===3?"grid":"none";
fillingOptions.style.display= step===4?"grid":"none";

builder.style.backgroundImage = [
"images/bg/base-bg.jpg",
"images/bg/type-bg.jpg",
"images/bg/coating-bg.jpg",
"images/bg/filling-bg.jpg"
][step-1];

}

function nextStep(){
if(step===1 && !base.src) return;
if(step===2 && !selectedType) return;
if(step===3 && !coating.src) return;

if(step===2){
coatingOptions.innerHTML=`
<img src="images/coating/${selectedType}_plain.png" onclick="selectCoating(this)">
<img src="images/coating/${selectedType}_pistachio.png" onclick="selectCoating(this)">
<img src="images/coating/${selectedType}_hazelnut.png" onclick="selectCoating(this)">
`;
}

if(step<4){
step++;
updateStep();
}
}

function selectBase(el){ base.src=el.src; setActive(el); }
function selectType(el,t){ selectedType=t; setActive(el); }
function selectCoating(el){ coating.src=el.src; setActive(el); }
function selectFilling(el){ inner.src=el.src; setActive(el); }

function setActive(el){
document.querySelectorAll(".options img").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

</script>

</body>
</html>
