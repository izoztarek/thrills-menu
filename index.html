<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrillz Menu - Premium Dynamic Customizer</title>
    
    <!-- استيراد خطوط حديثة تناسب الهوية البصرية لمتجر آيس كريم فاخر -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- تحسين التحميل المسبق للخلفيات الأساسية لمنع وميض الشاشة الأبيض المتكرر -->
    <link rel="preload" as="image" href="images/bg/base-bg.jpg">
    <link rel="preload" as="image" href="images/bg/type-bg.jpg">
    <link rel="preload" as="image" href="images/bg/coating-bg.jpg">
    <link rel="preload" as="image" href="images/bg/filling-bg.jpg">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF6B6B, #FF8E53);
            --secondary-gradient: linear-gradient(135deg, #c68a4a, #e09f5b);
            --dark-color: #2c3e50;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-active: rgba(255, 255, 255, 0.35);
            --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.3);
            --focused-shadow: 0 0 25px rgba(255, 142, 83, 0.6); /* تأثير ظل ناعم ومميز عند التركيز */
            --font-main: 'Poppins', sans-serif;
            --font-rounded: 'Comfortaa', cursive;
        }

        * {
            box-sizing: border-box;
            outline: none;
        }

        body {
            margin: 0;
            font-family: var(--font-main);
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* الطبقة الضبابية فوق الخلفية الأساسية */
        .overlay {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(4px);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* الهيدر والشعار */
        .logo {
            text-align: center;
            padding: 40px 20px;
        }

        .logo img {
            width: 160px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }

        .logo img:hover {
            transform: scale(1.05);
        }

        /* نظام الشبكة المرن للبطاقات */
        .container {
            max-width: 1400px;
            margin: auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* بطاقات المنتجات */
        .card-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            width: 100%;
            height: 320px;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 4px solid #fff;
            box-shadow: var(--shadow-sm);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: rgba(255,255,255,0.05);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: #FF8E53;
        }

        .card:hover img {
            transform: scale(1.08);
        }

        .card.active {
            transform: scale(1.03);
            border-color: #FF8E53;
        }

        .card-title {
            margin-top: 12px;
            font-family: var(--font-rounded);
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 0.5px;
        }

        /* واجهة تخصيص المنتج الديناميكية المتقدمة */
        .builder {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.6s ease-in-out;
        }

        .builder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.4), rgba(0, 0, 0, 0.75));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1;
        }

        /* نافذة المعاينة والطبقات */
        .preview {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 380px;
            z-index: 5;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: auto;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        /* تعديل موضع صوص الحشو الداخلي لكي يجلس في الأعلى بشكل واقعي متناسق */
        .innerLayer {
            position: absolute;
            width: 140px; /* زيادة حجم الصوص ليتناسب مع الجزء العلوي العريض */
            height: auto;
            top: 12%; /* سحب العنصر للأعلى ليكون متموضعاً فوق قمة عصا الآيس كريم مباشرة بدلاً من المنتصف */
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 6; /* ليكون أعلى طبقة الجسم الأساسي */
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.35));
        }

        /* حاوية الخيارات التفاعلية */
        .options-container {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 650px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .item-label {
            font-family: var(--font-rounded);
            font-size: 1rem;
            font-weight: 700;
            background: rgba(0,0,0,0.4);
            padding: 6px 16px;
            border-radius: 12px;
            min-height: 32px;
            transition: all 0.2s ease;
        }

        /* تعديل التصميم لعرض العناصر في أزواج جنباً إلى جنب بدلاً من عمود فردي */
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* تفعيل العرض الثنائي المشترك */
            gap: 15px;
            width: 100%;
            max-height: 240px; /* تفعيل حد أقصى للارتفاع لضمان عدم تداخل الواجهات */
            overflow-y: auto;  /* إضافة تمرير داخلي ناعم إذا زادت العناصر عن الحد */
            padding: 10px 5px;
            scroll-behavior: smooth;
        }

        /* جعل خيارات نوع الشوكولاتة متناسقة ثنائياً أيضاً */
        .options.typeGrid {
            grid-template-columns: repeat(2, 1fr);
        }
        
        /* إذا كان هناك عنصر فردي ثالث، يمتد ليأخذ العرض كاملاً من أجل توازن الشكل */
        .options.typeGrid .option-btn:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        /* تحسين مظهر أزرار الخيارات التفاعلية */
        .option-btn {
            background: var(--glass-bg);
            border: 3px solid transparent;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-shadow: var(--shadow-sm);
        }

        .option-btn img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            pointer-events: none;
        }

        .typeGrid .option-btn img {
            width: 85px;
            height: 85px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* إضاءة تدرج الظل الناعم عند استقبال التركيز أو التنشيط */
        .option-btn:focus, .option-btn.active {
            transform: scale(1.05);
            border-color: #fff;
            background: var(--glass-active);
            box-shadow: var(--focused-shadow); /* تفعيل تأثير الظل الناعم المطلوب */
        }

        .option-btn:hover:not(.active):not(:focus) {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* شريط التتبع العلوي */
        .stepper {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: var(--font-rounded);
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 50px;
            box-shadow: var(--shadow-sm);
        }

        /* أزرار التحكم والعمليات المحدثة */
        .nextBtn {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            padding: 16px 60px;
            border-radius: 50px;
            font-family: var(--font-main);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .nextBtn:hover {
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.6);
            filter: brightness(1.1);
        }

        .backBtn {
            position: absolute;
            top: 25px;
            left: 20px;
            background: #fff;
            color: var(--dark-color);
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            z-index: 10;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .backBtn:hover {
            background: #f8fafc;
            transform: translateY(-2px);
        }

        /* تخصيص السكرول بار الخاص بالقوائم ليكون ناعماً ومتناسقاً */
        .options::-webkit-scrollbar {
            width: 6px;
        }
        .options::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .options::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        @media (max-width: 600px) {
            .preview {
                width: 170px;
                height: 300px;
                top: 32%;
            }
            .innerLayer {
                width: 110px;
                top: 10%;
            }
            .option-btn img {
                width: 50px;
                height: 50px;
            }
            .options-container {
                bottom: 110px;
            }
            .nextBtn {
                padding: 14px 45px;
                font-size: 16px;
                bottom: 25px;
            }
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="logo">
        <img src="logo.png" alt="Thrillz Logo">
    </div>

    <div class="container">
        <div class="grid">
            <div class="card-wrapper">
                <button class="card" aria-label="Customize Premium Stick" onclick="Customizer.open()">
                    <img src="iced-cover.jpg" alt="Premium Custom Bar">
                </button>
                <span class="card-title">Design Your Stick</span>
            </div>
            <div class="card-wrapper">
                <button class="card" aria-label="Frappe Menu"><img src="frappe-cover.jpg" alt="Frappes"></button>
                <span class="card-title">Frappuccino</span>
            </div>
            <div class="card-wrapper">
                <button class="card" aria-label="Hot Drinks Menu"><img src="hot-cover.jpg" alt="Hot Drinks"></button>
                <span class="card-title">Hot Specialties</span>
            </div>
            <div class="card-wrapper">
                <button class="card" aria-label="Desserts Menu"><img src="dessert-cover.jpg" alt="Desserts"></button>
                <span class="card-title">Plated Desserts</span>
            </div>
            <div class="card-wrapper">
                <button class="card" aria-label="Bakery Menu"><img src="bakery-cover.jpg" alt="Bakery Items"></button>
                <span class="card-title">Fresh Bakery</span>
            </div>
            <div class="card-wrapper">
                <button class="card" aria-label="Breakfast Menu"><img src="breakfast-cover.jpg" alt="Breakfast"></button>
                <span class="card-title">Signature Breakfast</span>
            </div>
            <div class="card-wrapper">
                <button class="card" aria-label="Matcha Menu"><img src="matcha-cover.jpg" alt="Matcha Selection"></button>
                <span class="card-title">Pure Matcha</span>
            </div>
            <div class="card-wrapper">
                <button class="card" aria-label="Smoothies Menu"><img src="smoothie-cover.jpg" alt="Smoothies"></button>
                <span class="card-title">Organic Smoothies</span>
            </div>
        </div>
    </div>
</div>

<!-- نظام البناء والتخصيص الديناميكي -->
<div class="builder" id="builder" role="dialog" aria-modal="true" aria-labelledby="stepper">
    <button class="backBtn" onclick="Customizer.back()">← Back</button>
    <div class="stepper" id="stepper">Step 1 / 4</div>

    <div class="preview">
        <img id="baseLayer" class="layer" alt="Ice Cream Base View">
        <img id="coatingLayer" class="layer" alt="Ice Cream Coating View">
        <!-- عنصر الصلصة الداخلية المتموضع بدقة في أعلى القالب -->
        <img id="fillingLayer" class="innerLayer" alt="Ice Cream Filling View">
    </div>

    <div class="options-container">
        <div class="item-label" id="activeLabel">Select a Base Flavor</div>
        
        <!-- الخطوة 1 -->
        <div class="options" id="baseOptions">
            <button class="option-btn" data-name="Premium Vanilla" data-src="images/base/vanilla.png"><img src="images/base/vanilla.png" alt="Vanilla"></button>
            <button class="option-btn" data-name="Rich Chocolate" data-src="images/base/chocolate.png"><img src="images/base/chocolate.png" alt="Chocolate"></button>
            <button class="option-btn" data-name="Fresh Strawberry" data-src="images/base/strawberry.png"><img src="images/base/strawberry.png" alt="Strawberry"></button>
            <button class="option-btn" data-name="Gourmet Pistachio" data-src="images/base/pistachio.png"><img src="images/base/pistachio.png" alt="Pistachio"></button>
            <button class="option-btn" data-name="Roasted Hazelnut" data-src="images/base/hazelnut.png"><img src="images/base/hazelnut.png" alt="Hazelnut"></button>
        </div>

        <!-- الخطوة 2 -->
        <div class="options typeGrid" id="typeOptions" style="display:none;">
            <button class="option-btn" data-type="milk" data-name="Smooth Milk Chocolate"><img src="images/type/milk.jpg" alt="Milk Chocolate"></button>
            <button class="option-btn" data-type="dark" data-name="Belgian Dark Chocolate"><img src="images/type/dark.jpg" alt="Dark Chocolate"></button>
            <button class="option-btn" data-type="white" data-name="Creamy White Chocolate"><img src="images/type/white.jpg" alt="White Chocolate"></button>
        </div>

        <!-- الخطوة 3 -->
        <div class="options" id="coatingOptions" style="display:none;"></div>

        <!-- الخطوة 4 -->
        <div class="options" id="fillingOptions" style="display:none;">
            <button class="option-btn" data-name="Chocolate Core" data-src="images/filling/chocolate.png"><img src="images/filling/chocolate.png" alt="Chocolate Filling"></button>
            <button class="option-btn" data-name="Crushed Lotus Biscuit" data-src="images/filling/lotus.png"><img src="images/filling/lotus.png" alt="Lotus Filling"></button>
            <button class="option-btn" data-name="Salted Caramel" data-src="images/filling/caramel.png"><img src="images/filling/caramel.png" alt="Caramel Filling"></button>
            <button class="option-btn" data-name="Wild Berry Compote" data-src="images/filling/berry.png"><img src="images/filling/berry.png" alt="Berry Filling"></button>
            <button class="option-btn" data-name="Pistachio Crunch" data-src="images/filling/pistachio.png"><img src="images/filling/pistachio.png" alt="Pistachio Filling"></button>
            <button class="option-btn" data-name="Sweet Milk Cream" data-src="images/filling/milk.png"><img src="images/filling/milk.png" alt="Milk Filling"></button>
        </div>
    </div>

    <button class="nextBtn" id="nextBtn">Next</button>
</div>

<script>
/**
 * Thrillz Customizer Engine
 */
"use strict";

const Customizer = (function() {
    let DOM = {};
    
    const STATE = {
        bgList: [
            "images/bg/base-bg.jpg",
            "images/bg/type-bg.jpg",
            "images/bg/coating-bg.jpg",
            "images/bg/filling-bg.jpg"
        ],
        step: 1,
        selectedType: "",
        selections: { base: "", type: "", coating: "", filling: "" }
    };

    const stepLabels = {
        1: "Select a Base Flavor",
        2: "Choose Your Chocolate Type",
        3: "Pick Your Topping Coating",
        4: "Inject Inner Core Crunch"
    };

    function init() {
        DOM = {
            builder: document.getElementById("builder"),
            stepper: document.getElementById("stepper"),
            nextBtn: document.getElementById("nextBtn"),
            activeLabel: document.getElementById("activeLabel"),
            baseOptions: document.getElementById("baseOptions"),
            typeOptions: document.getElementById("typeOptions"),
            coatingOptions: document.getElementById("coatingOptions"),
            fillingOptions: document.getElementById("fillingOptions"),
            baseLayer: document.getElementById("baseLayer"),
            coatingLayer: document.getElementById("coatingLayer"),
            fillingLayer: document.getElementById("fillingLayer"),
            cards: document.querySelectorAll(".card")
        };

        DOM.nextBtn.addEventListener("click", handleNextStep);
        setupStaticOptions();
        initIntersectionObserver();
    }

    function initIntersectionObserver() {
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                entry.target.classList.toggle("active", entry.isIntersecting);
            });
        }, { threshold: 0.6 });

        DOM.cards.forEach(card => observer.observe(card));
    }

    function setupStaticOptions() {
        bindGroupEvents(DOM.baseOptions, "base", DOM.baseLayer);
        bindGroupEvents(DOM.typeOptions, "type", null, true);
        bindGroupEvents(DOM.fillingOptions, "filling", DOM.fillingLayer);
    }

    /**
     * ربط الأحداث مع إدراج ميزة الـ Auto-Focus Scroll والـ Focus Styling
     */
    function bindGroupEvents(container, stateKey, layerElement, isTypeStep = false) {
        container.querySelectorAll(".option-btn").forEach(btn => {
            // عند الضغط أو الاختيار المباشر
            btn.addEventListener("click", (e) => {
                const target = e.currentTarget;
                if (layerElement) target.getAttribute("data-src") ? layerElement.src = target.getAttribute("data-src") : null;
                if (isTypeStep) STATE.selectedType = target.getAttribute("data-type");
                
                updateActiveState(container, target);
                STATE.selections[stateKey] = target.getAttribute("data-name");
                
                // ميزة التمرير التلقائي الذكي لمركز العنصر المختار داخل الحاوية الثنائية
                target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });

            // ميزة التمرير التلقائي الفوري لمجرد تحرك الـ Focus (مثال عند استخدام لوحة المفاتيح Tab للتنقل)
            btn.addEventListener("focus", (e) => {
                e.currentTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
        });
    }

    function updateActiveState(container, activeElement) {
        container.querySelectorAll(".option-btn").forEach(img => img.classList.remove("active"));
        activeElement.classList.add("active");
        DOM.activeLabel.textContent = activeElement.getAttribute("data-name");
    }

    function openBuilder() {
        DOM.baseLayer.removeAttribute('src');
        DOM.coatingLayer.removeAttribute('src');
        DOM.fillingLayer.removeAttribute('src');
        document.querySelectorAll(".option-btn").forEach(btn => btn.classList.remove("active"));
        
        STATE.selectedType = "";
        STATE.step = 1;
        STATE.selections = { base: "", type: "", coating: "", filling: "" };
        
        DOM.builder.style.display = "block";
        updateStepUI();
    }

    function goBack() {
        if (STATE.step === 1) {
            DOM.builder.style.display = "none";
        } else {
            STATE.step--;
            updateStepUI();
        }
    }

    function updateStepUI() {
        DOM.baseOptions.style.display    = STATE.step === 1 ? "grid" : "none";
        DOM.typeOptions.style.display    = STATE.step === 2 ? "grid" : "none";
        DOM.coatingOptions.style.display = STATE.step === 3 ? "grid" : "none";
        DOM.fillingOptions.style.display = STATE.step === 4 ? "grid" : "none";

        DOM.builder.style.backgroundImage = `url(${STATE.bgList[STATE.step - 1]})`;
        DOM.stepper.textContent = `Step ${STATE.step} / 4`;
        DOM.nextBtn.textContent = STATE.step === 4 ? "Add to Cart 🛒" : "Next";

        const currentSelectionKey = ['base', 'type', 'coating', 'filling'][STATE.step - 1];
        DOM.activeLabel.textContent = STATE.selections[currentSelectionKey] || stepLabels[STATE.step];

        // ميزة إعادة التمرير التلقائي لأعلى قائمة الخيارات عند انتقال الخطوات
        const activeContainer = [DOM.baseOptions, DOM.typeOptions, DOM.coatingOptions, DOM.fillingOptions][STATE.step - 1];
        activeContainer.scrollTop = 0;
    }

    function handleNextStep() {
        if (STATE.step === 1 && !DOM.baseLayer.getAttribute('src')) return alert("Please select a base flavor first!");
        if (STATE.step === 2 && !STATE.selectedType) return alert("Please choose your preferred chocolate type!");
        if (STATE.step === 3 && !DOM.coatingLayer.getAttribute('src')) return alert("Please pick a topping coating!");

        if (STATE.step === 2) {
            generateCoatingOptions(STATE.selectedType);
        }

        if (STATE.step < 4) {
            STATE.step++;
            updateStepUI();
        } else {
            alert(`Delicious custom stick added to cart! 🎉\n- Base: ${STATE.selections.base}\n- Chocolate: ${STATE.selections.type}\n- Coating: ${STATE.selections.coating}\n- Filling: ${STATE.selections.filling || "None"}`);
            DOM.builder.style.display = "none";
        }
    }

    function generateCoatingOptions(type) {
        DOM.coatingOptions.innerHTML = "";
        
        const variants = [
            { id: 'plain', name: `Plain ${type.charAt(0).toUpperCase() + type.slice(1)}` },
            { id: 'pistachio', name: 'Crunchy Pistachio Flakes' },
            { id: 'hazelnut', name: 'Roasted Hazelnut Pieces' }
        ];
        
        const fragment = document.createDocumentFragment();
        
        variants.forEach(variant => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.setAttribute('data-name', variant.name);
            
            const imgPath = `images/coating/${type}_${variant.id}.png`;
            button.setAttribute('data-src', imgPath);
            
            const img = document.createElement('img');
            img.src = imgPath;
            img.alt = variant.name;
            
            button.appendChild(img);
            
            button.addEventListener('click', function() {
                DOM.coatingLayer.src = this.getAttribute('data-src');
                updateActiveState(DOM.coatingOptions, this);
                STATE.selections.coating = this.getAttribute('data-name');
                this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });

            button.addEventListener("focus", (e) => {
                e.currentTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
            
            fragment.appendChild(button);
        });
        
        DOM.coatingOptions.appendChild(fragment);
    }

    window.addEventListener("DOMContentLoaded", init);

    return {
        open: openBuilder,
        back: goBack
    };
})();
</script>

</body>
</html>
