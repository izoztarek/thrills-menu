<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kod El Fa7l V2</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;background:#0c0a09;color:#fff;font-family:Inter,sans-serif}
.lock{overflow:hidden}

/* CARD */
.card{transition:.4s;border-radius:16px;overflow:hidden;cursor:pointer}
.card.active{transform:scale(1.06);box-shadow:0 0 25px rgba(255,255,255,.2)}

/* BUILDER */
.layer{position:absolute;inset:0;object-fit:contain;transition:.3s}
.fade{opacity:0;transform:scale(.95)}
.show{opacity:1;transform:scale(1)}

.option{background:#1f1f1f;padding:12px;border-radius:12px;text-align:center;cursor:pointer;transition:.3s}
.option.active{transform:scale(1.1);box-shadow:0 0 15px #fff}

</style>
</head>

<body>

<!-- LOGO -->
<div class="text-center py-6 text-2xl font-bold text-amber-400">
KOD EL FA7L
</div>

<!-- GRID -->
<div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-4"></div>

<!-- VIEWER -->
<div id="viewer" class="fixed inset-0 bg-black/95 hidden flex-col z-50">
<div class="flex justify-between p-4">
<h2 id="viewerTitle"></h2>
<button onclick="closeViewer()">X</button>
</div>
<div id="viewerImgs" class="p-4 space-y-4 overflow-y-auto"></div>
<div id="cta" class="p-4 hidden">
<button onclick="openBuilder(active)" class="w-full bg-amber-400 text-black py-3 rounded-xl">
Make Your Own
</button>
</div>
</div>

<!-- BUILDER -->
<div id="builder" class="fixed inset-0 bg-black/95 hidden flex-col z-50">

<div class="flex justify-between p-4">
<span id="stepTitle"></span>
<span id="price">0 EGP</span>
</div>

<!-- PREVIEW -->
<div class="flex-1 flex items-center justify-center relative">
<div class="w-48 h-48 relative">
<img id="layer1" class="layer fade">
<img id="layer2" class="layer fade">
<img id="layer3" class="layer fade">
<img id="layer4" class="layer fade">
</div>
</div>

<!-- OPTIONS -->
<div id="options" class="grid grid-cols-3 gap-3 p-4"></div>

<!-- BUTTONS -->
<div class="flex justify-between p-4">
<button onclick="prev()">Back</button>
<button id="next" onclick="next()">Next</button>
</div>

</div>

<script>

/* MENU */

const MENU=[
{id:"ice",type:"custom",img:"assets/menu/ice-cream.jpg"},
{id:"mini",type:"static",img:"assets/menu/mini.jpg",folder:"mini"},
{id:"v60",type:"static",img:"assets/menu/v60.jpg",folder:"v60"},
{id:"coldbrew",type:"static",img:"assets/menu/cold-brew.jpg",folder:"coldbrew"},
{id:"matcha",type:"static",img:"assets/menu/matcha.jpg",folder:"matcha"},
{id:"waffle",type:"hybrid",img:"assets/menu/waffle.jpg",folder:"waffle"},
{id:"milk",type:"hybrid",img:"assets/menu/milkshake.jpg",folder:"milkshake"},
{id:"special",type:"static",img:"assets/menu/special.jpg",folder:"special"}
];

const grid=document.getElementById("grid");

MENU.forEach(m=>{
let d=document.createElement("div");
d.className="card bg-stone-800";
d.innerHTML=`<img src="${m.img}" class="w-full h-40 object-cover">`;
d.onclick=()=>openSection(m);
grid.appendChild(d);
});

/* VIEWER */

let active=null;

function openSection(m){
active=m.id;

if(m.type==="custom"){openBuilder(m.id);return;}

viewer.classList.remove("hidden");
viewerImgs.innerHTML="";
viewerTitle.innerText=m.id;

for(let i=1;i<=3;i++){
let img=document.createElement("img");
img.src=`assets/${m.folder}/${m.folder}${i}.jpg`;
img.className="w-full";
viewerImgs.appendChild(img);
}

if(m.type==="hybrid"){
cta.classList.remove("hidden");
}else{
cta.classList.add("hidden");
}
}

function closeViewer(){
viewer.classList.add("hidden");
}

/* BUILDER */

let step=0;
let total=0;

let selections={};

const STEPS=[
{
name:"Base",
key:"base",
price:45,
options:[
"base-vanilla.png",
"base-chocolate.png",
"base-pistachio.png"
]
},
{
name:"Chocolate",
key:"choc",
price:10,
options:[
"choc-milk.png",
"choc-dark.png",
"choc-white.png"
]
},
{
name:"Coating",
key:"coat",
price:20,
options:[
"coat-lotus.png",
"coat-rocher.png"
]
},
{
name:"Filling",
key:"fill",
price:10,
options:[
"fill-caramel.png",
"fill-nutella.png",
"fill-berry.png"
]
}
];

function openBuilder(){
builder.classList.remove("hidden");
step=0;
total=0;
selections={};
render();
}

/* RENDER */

function render(){
stepTitle.innerText=STEPS[step].name;
options.innerHTML="";

STEPS[step].options.forEach(o=>{
let el=document.createElement("div");
el.className="option";
el.innerText=o;

el.onclick=()=>{
select(o,el);
};

options.appendChild(el);
});
}

/* SELECT */

function select(o,el){

document.querySelectorAll(".option").forEach(x=>x.classList.remove("active"));
el.classList.add("active");

selections[STEPS[step].key]=o;

total = calcPrice();
price.innerText=total+" EGP";

updatePreview();
}

/* PREVIEW LAYERS */

function updatePreview(){

const map=[
"layer1",
"layer2",
"layer3",
"layer4"
];

Object.keys(selections).forEach((k,i)=>{
let img=document.getElementById(map[i]);
img.src="assets/ice-cream/"+selections[k];
img.classList.remove("fade");
img.classList.add("show");
});
}

/* PRICE */

function calcPrice(){
let p=0;
Object.keys(selections).forEach((k,i)=>{
p+=STEPS[i].price;
});
return p;
}

/* NAV */

function next(){
if(!selections[STEPS[step].key]) return;

if(step<STEPS.length-1){
step++;
render();
}else{
alert("Order Ready!");
builder.classList.add("hidden");
}
}

function prev(){
if(step>0){
step--;
render();
}else{
builder.classList.add("hidden");
}
}

</script>

</body>
</html>
