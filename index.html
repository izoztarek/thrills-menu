<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

/* ===== Background ===== */
body {
    margin: 0;
    font-family: Arial;
    background: url('bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.45);
    min-height: 100vh;
}

/* ===== Logo ===== */
.logo {
    text-align: center;
    padding: 30px;
}

.logo img {
    width: 150px;
}

/* ===== Grid ===== */
.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

@media(min-width:768px){
    .grid {grid-template-columns: repeat(3,1fr);}
}

@media(min-width:1100px){
    .grid {grid-template-columns: repeat(4,1fr);}
}

/* ===== Cards ===== */
.card {
    height: 330px;
    border-radius: 25px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card:hover,
.card.active {
    transform: scale(1.07);
    box-shadow: 0 20px 40px rgba(255,255,255,0.2);
}

/* ===== BUILDER ===== */
.builder {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    text-align: center;
    padding: 20px;
}

.header {
    margin-top: 40px;
    font-size: 26px;
    color: white;
    font-family: 'Trebuchet MS', cursive;
}

.flavorName {
    margin-top: 10px;
    color: white;
}

/* Preview */
.preview {
    position: relative;
    width: 200px;
    height: 400px;
    margin: 30px auto;
}

.layer {
    position: absolute;
    width: 100%;
    left: 50%;
    transform: translateX(-50%);
    transition: 0.3s;
}

/* Options */
.options {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.options img {
    width: 60px;
    height: 120px;
    object-fit: contain;
    cursor: pointer;
}

.active {
    transform: scale(1.2);
    filter: drop-shadow(0 0 10px white);
}

/* Buttons */
.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border-radius: 25px;
    border: none;
    background: #c68a4a;
    color: white;
    cursor: pointer;
}

.typeBtn.active {
    background: white;
    color: black;
}

.backBtn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    color: black;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="overlay">

<div class="logo">
<img src="logo.png">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openIce()"><img src="iced-cover.jpg"></div>
<div class="card"><img src="frappe-cover.jpg"></div>
<div class="card"><img src="hot-cover.jpg"></div>
<div class="card"><img src="dessert-cover.jpg"></div>
<div class="card"><img src="bakery-cover.jpg"></div>
<div class="card"><img src="breakfast-cover.jpg"></div>
<div class="card"><img src="matcha-cover.jpg"></div>
<div class="card"><img src="smoothie-cover.jpg"></div>

</div>
</div>

</div>

<!-- BUILDER -->
<div class="builder" id="builder">

<div class="backBtn" onclick="goBack()">← Back</div>

<div class="header" id="title">Choose Your Base Flavor</div>
<div class="flavorName" id="flavorText"></div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
</div>

<!-- STEP 1 -->
<div class="options" id="baseOptions">
<img src="images/base/vanilla.png" onclick="selectBase(this,'Vanilla','images/base/vanilla.png')">
<img src="images/base/chocolate.png" onclick="selectBase(this,'Chocolate','images/base/chocolate.png')">
<img src="images/base/strawberry.png" onclick="selectBase(this,'Strawberry','images/base/strawberry.png')">
<img src="images/base/pistachio.png" onclick="selectBase(this,'Pistachio','images/base/pistachio.png')">
<img src="images/base/hazelnut.png" onclick="selectBase(this,'Hazelnut','images/base/hazelnut.png')">
</div>

<!-- STEP 2 -->
<div class="options" id="typeOptions" style="display:none;">
<button class="btn typeBtn" onclick="chooseType('Milk',this)">Milk</button>
<button class="btn typeBtn" onclick="chooseType('Dark',this)">Dark</button>
<button class="btn typeBtn" onclick="chooseType('White',this)">White</button>
</div>

<!-- STEP 3 -->
<div class="options" id="coatingOptions" style="display:none;"></div>

<button class="btn" onclick="nextStep()">Next</button>

</div>

<script>

let step = 1;
let selectedType = "";
let typeSelected = false;

/* open */
function openIce(){
    document.getElementById("builder").style.display="block";
}

/* back */
function goBack(){
    if(step==2){step=1;showStep1();}
    else if(step==3){step=2;showStep2();}
}

/* steps */
function showStep1(){
    baseOptions.style.display="flex";
    typeOptions.style.display="none";
    coatingOptions.style.display="none";
    title.innerText="Choose Your Base Flavor";
}

function showStep2(){
    baseOptions.style.display="none";
    typeOptions.style.display="flex";
    coatingOptions.style.display="none";
    title.innerText="Choose Your Coating Flavor";
}

function showStep3(){
    typeOptions.style.display="none";
    coatingOptions.style.display="flex";
}

/* next */
function nextStep(){
    if(step==1){
        if(!base.src) return alert("Choose base");
        step=2; showStep2();
    }
    else if(step==2){
        if(!typeSelected) return alert("Choose type");
        step=3; showStep3();
    }
}

/* base */
function selectBase(el,name,src){
    base.src=src;
    flavorText.innerText=name;
    setActive(el);
}

/* type */
function chooseType(type,el){
    selectedType=type;
    typeSelected=true;

    document.querySelectorAll(".typeBtn").forEach(b=>b.classList.remove("active"));
    el.classList.add("active");

    if(type==="Milk"){
        coatingOptions.innerHTML=`
        <img src="images/coating/milk_plain.png" onclick="selectCoating(this,'Plain')">
        <img src="images/coating/milk_pistachio.png" onclick="selectCoating(this,'Pistachio')">
        <img src="images/coating/milk_hazelnut.png" onclick="selectCoating(this,'Hazelnut')">
        `;
    }

    if(type==="Dark"){
        coatingOptions.innerHTML=`
        <img src="images/coating/dark_plain.png" onclick="selectCoating(this,'Plain')">
        <img src="images/coating/dark_pistachio.png" onclick="selectCoating(this,'Pistachio')">
        <img src="images/coating/dark_hazelnut.png" onclick="selectCoating(this,'Hazelnut')">
        `;
    }

    if(type==="White"){
        coatingOptions.innerHTML=`
        <img src="images/coating/white_plain.png" onclick="selectCoating(this,'Plain')">
        <img src="images/coating/white_pistachio.png" onclick="selectCoating(this,'Pistachio')">
        <img src="images/coating/white_hazelnut.png" onclick="selectCoating(this,'Hazelnut')">
        `;
    }
}

/* ⭐ هنا التعديل المهم */
function selectCoating(el,name){

    // اسم الفليفر
    flavorText.innerText = selectedType + " " + name;

    // نحط الصوص فوق الايسكريم
    let imgSrc = el.getAttribute("src");
    coating.src = imgSrc;

    setActive(el);
}

/* active */
function setActive(el){
    document.querySelectorAll(".options img").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
}

</script>

</body>
</html>
