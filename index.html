<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<!-- ⭐ Preload Backgrounds -->
<link rel="preload" as="image" href="images/bg/base-bg.jpg">
<link rel="preload" as="image" href="images/bg/type-bg.jpg">
<link rel="preload" as="image" href="images/bg/coating-bg.jpg">
<link rel="preload" as="image" href="images/bg/filling-bg.jpg">

<style>

body{
    margin:0;
    font-family:Arial;
    background:url('bg.jpg') no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    background:rgba(0,0,0,0.5);
    min-height:100vh;
}

/* LOGO */
.logo{
    text-align:center;
    padding:25px;
}
.logo img{
    width:150px;
}

/* GRID */
.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

@media(min-width:768px){
    .grid{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:1100px){
    .grid{grid-template-columns:repeat(4,1fr);}
}

/* CARDS */
.card{
    height:300px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.card:hover,
.card.active{
    transform:scale(1.05);
    box-shadow:0 15px 35px rgba(255,255,255,0.15);
}

/* BUILDER */
.builder{
    display:none;
    position:fixed;
    inset:0;
    z-index:2000;
    text-align:center;
    overflow-y:auto;
    padding:20px;
    background-size:cover;
    background-position:center;
    transition:0.3s;
}

/* ICECREAM */
.preview{
    position:relative;
    width:200px;
    height:400px;
    margin:40px auto;
}

.layer{
    position:absolute;
    width:100%;
    left:50%;
    transform:translateX(-50%);
}

.innerLayer{
    position:absolute;
    width:135px;
    top:-22px;
    left:50%;
    transform:translateX(-50%);
}

/* OPTIONS */
.options{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    justify-items:center;
    padding-bottom:140px;
}

/* TYPE */
.typeGrid{
    grid-template-columns:repeat(3,1fr);
}

.typeGrid img{
    width:90%;
    height:110px;
    object-fit:cover;
    border-radius:15px;
    padding:0;
    background:none;
}

/* DEFAULT */
.options img{
    width:90px;
    height:90px;
    object-fit:contain;
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:15px;
    cursor:pointer;
}

/* FILLING */
#fillingOptions img{
    width:110px;
    height:110px;
}

/* ACTIVE */
.active{
    transform:scale(1.2);
    filter:drop-shadow(0 0 10px white);
}

/* BUTTONS */
.nextBtn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#c68a4a;
    color:#fff;
    border:none;
    padding:14px 40px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    z-index:9999;
}

.backBtn{
    position:absolute;
    top:20px;
    left:20px;
    background:white;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay">

<div class="logo">
<img src="logo.png" loading="lazy">
</div>

<div class="container">
<div class="grid">

<div class="card" onclick="openBuilder()"><img src="iced-cover.jpg" loading="lazy"></div>
<div class="card"><img src="frappe-cover.jpg" loading="lazy"></div>
<div class="card"><img src="hot-cover.jpg" loading="lazy"></div>
<div class="card"><img src="dessert-cover.jpg" loading="lazy"></div>
<div class="card"><img src="bakery-cover.jpg" loading="lazy"></div>
<div class="card"><img src="breakfast-cover.jpg" loading="lazy"></div>
<div class="card"><img src="matcha-cover.jpg" loading="lazy"></div>
<div class="card"><img src="smoothie-cover.jpg" loading="lazy"></div>

</div>
</div>

</div>

<!-- BUILDER -->
<div class="builder" id="builder">

<div class="backBtn" onclick="goBack()">← Back</div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
<img id="inner" class="innerLayer">
</div>

<!-- BASE -->
<div class="options" id="baseOptions">
<img src="images/base/vanilla.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/chocolate.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/strawberry.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/pistachio.png" loading="lazy" onclick="selectBase(this)">
<img src="images/base/hazelnut.png" loading="lazy" onclick="selectBase(this)">
</div>

<!-- TYPE -->
<div class="options typeGrid" id="typeOptions" style="display:none;">
<img src="images/type/milk.jpg" loading="lazy" onclick="selectType(this,'milk')">
<img src="images/type/dark.jpg" loading="lazy" onclick="selectType(this,'dark')">
<img src="images/type/white.jpg" loading="lazy" onclick="selectType(this,'white')">
</div>

<!-- COATING -->
<div class="options" id="coatingOptions" style="display:none;"></div>

<!-- FILLING -->
<div class="options" id="fillingOptions" style="display:none;">
<img src="images/filling/chocolate.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/lotus.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/caramel.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/berry.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/pistachio.png" loading="lazy" onclick="selectFilling(this)">
<img src="images/filling/milk.png" loading="lazy" onclick="selectFilling(this)">
</div>

<button class="nextBtn" onclick="nextStep()">Next</button>

</div>

<script>

/* ⭐ SMART PRELOAD */
const preloadImages = [
"images/bg/base-bg.jpg",
"images/bg/type-bg.jpg",
"images/bg/coating-bg.jpg",
"images/bg/filling-bg.jpg",
"images/base/vanilla.png",
"images/base/chocolate.png",
"images/base/strawberry.png",
"images/base/pistachio.png",
"images/base/hazelnut.png",
"images/type/milk.jpg",
"images/type/dark.jpg",
"images/type/white.jpg"
];

preloadImages.forEach(src=>{
    const img = new Image();
    img.src = src;
});

let step=1;
let selectedType="";

/* AUTO FOCUS */
const cards=document.querySelectorAll(".card");
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>e.target.classList.toggle("active",e.isIntersecting));
},{threshold:0.6});
cards.forEach(c=>observer.observe(c));

function openBuilder(){
builder.style.display="block";
step=1;
updateStep();
}

function goBack(){
if(step===1){
builder.style.display="none";
}else{
step--;
updateStep();
}
}

function updateStep(){

baseOptions.style.display= step===1?"grid":"none";
typeOptions.style.display= step===2?"grid":"none";
coatingOptions.style.display= step===3?"grid":"none";
fillingOptions.style.display= step===4?"grid":"none";

if(step===1) builder.style.backgroundImage="url('images/bg/base-bg.jpg')";
if(step===2) builder.style.backgroundImage="url('images/bg/type-bg.jpg')";
if(step===3) builder.style.backgroundImage="url('images/bg/coating-bg.jpg')";
if(step===4) builder.style.backgroundImage="url('images/bg/filling-bg.jpg')";
}

function nextStep(){

if(step===1 && !base.src) return;
if(step===2 && !selectedType) return;
if(step===3 && !coating.src) return;

if(step===2) loadCoating();

if(step<4){
step++;
updateStep();
}
}

function selectBase(el){
base.src=el.src;
setActive(el);
}

function selectType(el,type){
selectedType=type;
setActive(el);
}

function loadCoating(){
coatingOptions.innerHTML=`
<img src="images/coating/${selectedType}_plain.png" loading="lazy" onclick="selectCoating(this)">
<img src="images/coating/${selectedType}_pistachio.png" loading="lazy" onclick="selectCoating(this)">
<img src="images/coating/${selectedType}_hazelnut.png" loading="lazy" onclick="selectCoating(this)">
`;
}

function selectCoating(el){
coating.src=el.src;
setActive(el);
}

function selectFilling(el){
inner.src=el.src;
setActive(el);
}

function setActive(el){
document.querySelectorAll(".options img").forEach(i=>i.classList.remove("active"));
el.classList.add("active");
}

</script>

</body>
</html>
