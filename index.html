<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrillz Menu</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:url('bg.jpg') no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    background:rgba(0,0,0,0.5);
    min-height:100vh;
}

/* Grid */
.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.card{
    height:300px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Builder */
.builder{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    z-index:2000;
    text-align:center;
    overflow-y:auto;
    padding:20px;
}

.header{
    margin-top:40px;
    color:#fff;
    font-size:26px;
}

.flavorName{
    color:#fff;
    margin-top:10px;
}

/* Icecream preview */
.preview{
    position:relative;
    width:200px;
    height:400px;
    margin:20px auto;
}

.layer{
    position:absolute;
    width:100%;
    left:50%;
    transform:translateX(-50%);
}

.innerLayer{
    position:absolute;
    width:115px;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
}

/* Options */
.options{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    justify-items:center;
    padding-bottom:120px;
}

.options img{
    width:90px;
    height:90px;
    object-fit:contain;
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:15px;
    cursor:pointer;
}

/* Active */
.active{
    transform:scale(1.2);
    filter:drop-shadow(0 0 10px #fff);
}

/* Next button */
.nextBtn{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#c68a4a;
    color:#fff;
    border:none;
    padding:12px 30px;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

/* Back */
.backBtn{
    position:absolute;
    top:20px;
    left:20px;
    background:#fff;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="overlay">
<div class="container">
<div class="grid">
<div class="card" onclick="openBuilder()">
<img src="iced-cover.jpg">
</div>
</div>
</div>
</div>

<!-- BUILDER -->
<div class="builder" id="builder">

<div class="backBtn" onclick="goBack()">← Back</div>

<div class="header" id="title">Choose Your Base</div>
<div class="flavorName" id="flavorText"></div>

<div class="preview">
<img id="base" class="layer">
<img id="coating" class="layer">
<img id="inner" class="innerLayer">
</div>

<!-- Base -->
<div class="options" id="baseOptions">
<img src="images/base/vanilla.png" onclick="selectBase(this,'Vanilla')">
<img src="images/base/chocolate.png" onclick="selectBase(this,'Chocolate')">
<img src="images/base/strawberry.png" onclick="selectBase(this,'Strawberry')">
<img src="images/base/pistachio.png" onclick="selectBase(this,'Pistachio')">
<img src="images/base/hazelnut.png" onclick="selectBase(this,'Hazelnut')">
</div>

<!-- Type -->
<div class="options" id="typeOptions" style="display:none;">
<img src="images/type/milk.png" onclick="selectType(this,'Milk')">
<img src="images/type/dark.png" onclick="selectType(this,'Dark')">
<img src="images/type/white.png" onclick="selectType(this,'White')">
</div>

<!-- Coating -->
<div class="options" id="coatingOptions" style="display:none;"></div>

<!-- Filling -->
<div class="options" id="fillingOptions" style="display:none;">
<img src="images/filling/chocolate.png" onclick="selectFilling(this,'Chocolate')">
<img src="images/filling/lotus.png" onclick="selectFilling(this,'Lotus')">
<img src="images/filling/caramel.png" onclick="selectFilling(this,'Caramel')">
<img src="images/filling/berry.png" onclick="selectFilling(this,'Berry')">
<img src="images/filling/pistachio.png" onclick="selectFilling(this,'Pistachio')">
<img src="images/filling/milk.png" onclick="selectFilling(this,'Milk')">
</div>

<button class="nextBtn" onclick="nextStep()">Next</button>

</div>

<script>

let step=1;
let selectedType="";

function openBuilder(){
    builder.style.display="block";
}

/* Steps */
function nextStep(){

    if(step===1){
        if(!base.src) return alert("Choose base");
        step=2;
        baseOptions.style.display="none";
        typeOptions.style.display="grid";
        title.innerText="Choose Chocolate Type";
    }

    else if(step===2){
        if(!selectedType) return alert("Choose type");

        step=3;
        typeOptions.style.display="none";
        coatingOptions.style.display="grid";
        title.innerText="Choose Coating";

        loadCoating();
    }

    else if(step===3){
        if(!coating.src) return alert("Choose coating");

        step=4;
        coatingOptions.style.display="none";
        fillingOptions.style.display="grid";
        title.innerText="Choose Filling";
    }
}

/* Back */
function goBack(){
    if(step===2){
        step=1;
        typeOptions.style.display="none";
        baseOptions.style.display="grid";
    }
    else if(step===3){
        step=2;
        coatingOptions.style.display="none";
        typeOptions.style.display="grid";
    }
    else if(step===4){
        step=3;
        fillingOptions.style.display="none";
        coatingOptions.style.display="grid";
    }
}

/* Selectors */
function selectBase(el,name){
    base.src=el.src;
    flavorText.innerText=name;
    setActive(el);
}

function selectType(el,type){
    selectedType=type;
    flavorText.innerText=type;
    setActive(el);
}

function loadCoating(){
    coatingOptions.innerHTML=`
    <img src="images/coating/${selectedType.toLowerCase()}_plain.png" onclick="selectCoating(this,'Plain')">
    <img src="images/coating/${selectedType.toLowerCase()}_pistachio.png" onclick="selectCoating(this,'Pistachio')">
    <img src="images/coating/${selectedType.toLowerCase()}_hazelnut.png" onclick="selectCoating(this,'Hazelnut')">
    `;
}

function selectCoating(el,name){
    coating.src=el.src;
    flavorText.innerText=selectedType+" "+name;
    setActive(el);
}

function selectFilling(el,name){
    inner.src=el.src;
    flavorText.innerText+= " + " + name;
    setActive(el);
}

function setActive(el){
    document.querySelectorAll(".options img").forEach(i=>i.classList.remove("active"));
    el.classList.add("active");
}

</script>

</body>
</html>
